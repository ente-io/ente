appId: io.ente.bhari-frame
artifactName: ${productName}-${version}-${arch}.${ext}
files:
    - app/**/*
    - out
extraFiles:
    - from: build
      to: resources
beforeBuild: scripts/beforeBuild.js
protocols:
    - name: Ente
      schemes: ["ente"]
win:
    files:
        - "!node_modules/onnxruntime-node/bin/napi-v6/**/*"
        - "node_modules/onnxruntime-node/bin/napi-v6/win32/${arch}/**/*"
    target:
        - target: nsis
          arch: [x64, arm64]
    azureSignOptions:
        publisherName: ENTE TECHNOLOGIES, INC.
        endpoint: https://eus.codesigning.azure.net/
        certificateProfileName: EnteTrustCertProfile
        codeSigningAccountName: EnteTechnologiesInc
    signExts: [".dll", ".node"]
nsis:
    deleteAppDataOnUninstall: true
linux:
    files:
        - "!node_modules/onnxruntime-node/bin/napi-v6/**/*"
        - "node_modules/onnxruntime-node/bin/napi-v6/linux/${arch}/**/*"
    target:
        - target: AppImage
          arch: [x64, arm64]
        - target: deb
          arch: [x64, arm64]
        - target: rpm
          arch: [x64, arm64]
        - target: pacman
          arch: [x64, arm64]
    category: Photography
    icon: ./build/icon.icns
mac:
    files:
        - "!node_modules/onnxruntime-node/bin/napi-v6/**/*"
        - "node_modules/onnxruntime-node/bin/napi-v6/darwin/arm64/**/*"
        - "node_modules/onnxruntime-node/bin/napi-v6/darwin/x64/**/*"
    target:
        target: default
        arch: [universal]
    category: public.app-category.photography
    hardenedRuntime: true
    mergeASARs: false
