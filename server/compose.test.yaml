services:
  postgres-test:
    image: postgres:15
    environment:
      POSTGRES_DB: ente_test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d ente_test_db -U test_user"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  server-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      ENV: test
      PGPASSWORD: test_pass
    command:
      - /bin/sh
      - -lc
      - |
        export PATH="/usr/local/go/bin:/go/bin:$$PATH"
        socat TCP-LISTEN:5432,fork,reuseaddr TCP:postgres-test:5432 &
        socat_pid=$$!
        trap 'kill "$$socat_pid"' EXIT
        until pg_isready -h localhost -p 5432 -U test_user -d ente_test_db; do
          sleep 1
        done
        go test -p 1 -count=1 ./...

volumes:
  postgres-test-data:
