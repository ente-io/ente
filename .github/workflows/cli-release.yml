name: "Release (cli)"

on:
    push:
        # Run when a tag matching the pattern "cli-v*"" is pushed
        #
        # Tip: to test this workflow, push at tag with a pre-release version,
        # e.g. `cli-v1.2.3-test`, where 1.2.3 is the expected version number of
        # the next release that'll go out.
        #
        # See: [Note: Testing release workflows that are triggered by tags]
        tags:
            - "cli-v*"

permissions:
    contents: write

jobs:
    draft-release:
        runs-on: ubuntu-latest
        steps:
            - name: Create a draft GitHub release
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  draft: true

    build:
        runs-on: ubuntu-latest
        needs: draft-release

        strategy:
            matrix:
                goos: [linux, windows, darwin]
                goarch: ["386", amd64, arm64]
                exclude:
                    - goarch: "386"
                      goos: darwin

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: cli/go.mod
                  cache: false

            - name: Build binaries and add to the release
              env:
                  CGO_ENABLED: 0
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GOARCH: ${{ matrix.goarch }}
                  GOOS: ${{ matrix.goos }}
              run: |
                  set -euo pipefail

                  asset="ente-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
                  binary="ente"
                  dist="$RUNNER_TEMP/cli-release"
                  version="${GITHUB_REF_NAME#cli-}"

                  if [ "$GOOS" = windows ]; then
                      binary="ente.exe"
                  fi

                  mkdir -p "$dist"
                  go build -C cli -trimpath -ldflags "-X main.AppVersion=$version -s -w" -o "$dist/$binary"

                  cd "$dist"
                  if [ "$GOOS" = windows ]; then
                      asset="$asset.zip"
                      zip -vr "$asset" "$binary"
                  else
                      asset="$asset.tar.gz"
                      tar cvfz "$asset" "$binary"
                  fi

                  sha256sum "$asset" | cut -d ' ' -f 1 > "$asset.sha256"
                  gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256"
