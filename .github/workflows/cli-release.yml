name: "Release (CLI)"

on:
    push:
        # Run when a tag matching the pattern "cli-v*"" is pushed
        #
        # Tip: to test this workflow, push at tag with a pre-release version,
        # e.g. `cli-v1.2.3-test`, where 1.2.3 is the expected version number of
        # the next release that'll go out.
        #
        # See: [Note: Testing release workflows that are triggered by tags]
        tags:
            - "cli-v*"

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                goos: [linux, windows, darwin]
                goarch: ["386", amd64, arm64]
                exclude:
                    - goarch: "386"
                      goos: darwin

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: cli/go.mod
                  cache: false

            - name: Build release asset
              id: build
              env:
                  CGO_ENABLED: 0
                  GOARCH: ${{ matrix.goarch }}
                  GOOS: ${{ matrix.goos }}
              run: |
                  set -euo pipefail

                  asset="ente-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
                  binary="ente"
                  dist="$RUNNER_TEMP/cli-release"
                  version="${GITHUB_REF_NAME#cli-}"

                  if [ "$GOOS" = windows ]; then
                      binary="ente.exe"
                  fi

                  mkdir -p "$dist"
                  go build -C cli -trimpath -ldflags "-X main.AppVersion=$version -s -w" -o "$dist/$binary"

                  cd "$dist"
                  if [ "$GOOS" = windows ]; then
                      asset="$asset.zip"
                      zip -vr "$asset" "$binary"
                  else
                      asset="$asset.tar.gz"
                      tar cvfz "$asset" "$binary"
                  fi

                  echo "asset=$asset" >> "$GITHUB_OUTPUT"
                  echo "asset_path=$dist/$asset" >> "$GITHUB_OUTPUT"

            - name: Upload release asset
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: ${{ steps.build.outputs.asset }}
                  path: ${{ steps.build.outputs.asset_path }}
                  if-no-files-found: error
                  compression-level: 0

    release:
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - name: Download release assets
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  path: ${{ runner.temp }}/cli-release-assets
                  pattern: ente-${{ github.ref_name }}-*
                  merge-multiple: true

            - name: Create draft release
              env:
                  GH_REPO: ${{ github.repository }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  cd "$RUNNER_TEMP/cli-release-assets"
                  sha256sum * | sort -k2 > SHA256SUMS
                  gh release create "$GITHUB_REF_NAME" \
                      --draft \
                      --notes "" \
                      --title "$GITHUB_REF_NAME" \
                      --verify-tag \
                      *
