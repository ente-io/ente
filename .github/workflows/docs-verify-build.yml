name: "Verify build (Docs)"

# Preflight build of docs. This allows us to ensure that npm run build is
# succeeding before we merge the PR into main.

on:
    # Run on every pull request (open or push to it) that changes docs/
    pull_request:
        paths:
            - "docs/**"
            - ".github/workflows/docs-verify-build.yml"

permissions:
    contents: read

jobs:
    verify-build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: docs

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup node and enable npm caching
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "docs/package-lock.json"

            - run: npm ci

            - run: npm audit --audit-level=critical

            - run: npm run build
