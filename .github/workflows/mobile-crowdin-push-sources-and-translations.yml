name: "Push sources and translations to Crowdin (mobile)"

# This is a variant of the mobile Crowdin sync workflows that uploads the
# translated strings in addition to the source strings.
#
# This allows us to change the strings in our source code for an automated
# refactoring (e.g. renaming a placeholder), and then run this workflow to
# update the data in Crowdin taking our source code as the source of truth.

# USAGE:
#
# Be careful with this workflow since it updates both the sources and
# translations on Crowdin, and any changes on Crowdin that are not in the
# branch from which this workflow is run will be lost.
#
# 1. Run the normal sync workflow:
#   `gh workflow run mobile-crowdin-sync.yml`
#
# 2. Merge the translations PR it creates. So now `main` includes the latest
#    Crowdin translations.
#
# 3. Branch from updated `main` and make the string edits.
#
# 4. Push the branch and run this workflow
#   `gh workflow run mobile-crowdin-push-sources-and-translations.yml --ref <branch> -f app=photos`
#
# 5. After it succeeds, merge the string-edit PR.

on:
    # Trigger manually, or using
    # `gh workflow run mobile-crowdin-push-sources-and-translations.yml --ref <my-branch> -f app=photos`
    workflow_dispatch:
        inputs:
            app:
                description: "Mobile app to push"
                required: true
                default: "all"
                type: choice
                options:
                    - all
                    - photos
                    - auth
                    - locker

permissions:
    contents: write
    pull-requests: write

jobs:
    push-sources-and-translations-to-crowdin:
        name: "Push ${{ matrix.app }} sources and translations"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - app: photos
                      base_path: "mobile/apps/photos/"
                      config: "mobile/apps/photos/crowdin.yml"
                      project_id: 574741
                    - app: auth
                      base_path: "mobile/apps/auth/"
                      config: "mobile/apps/auth/crowdin.yml"
                      project_id: 575169
                    - app: locker
                      base_path: "mobile/apps/locker/"
                      config: "mobile/apps/locker/crowdin.yml"
                      project_id: 860056

        steps:
            - name: Checkout
              if: ${{ inputs.app == 'all' || inputs.app == matrix.app }}
              uses: actions/checkout@v6

            - name: Crowdin push
              if: ${{ inputs.app == 'all' || inputs.app == matrix.app }}
              uses: crowdin/github-action@v2
              with:
                  base_path: ${{ matrix.base_path }}
                  config: ${{ matrix.config }}
                  upload_sources: true
                  upload_translations: true
                  download_translations: false
                  project_id: ${{ matrix.project_id }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
