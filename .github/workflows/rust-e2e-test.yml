name: "Test (Rust Integration)"

on:
    pull_request:
        paths:
            - ".github/workflows/rust-e2e-test.yml"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - "rust/apps/cli/**"
            - "rust/crates/**"
            - "rust/e2e/**"
            - "server/**"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    cli-integration:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: rust/apps/cli

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup go
              uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
              with:
                  go-version-file: server/go.mod

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24

            - name: Install PGlite test dependency
              run: npm ci --prefix tests/pglite

            - name: Run CLI integration tests
              run: cargo test --features museum,pglite --locked

    docker-e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Run Docker E2E suite
              env:
                  ENTE_E2E_DOCKER_PROJECT: ente-rust-e2e-${{ github.run_id }}-${{ github.run_attempt }}
                  ENTE_E2E_ENDPOINT: http://localhost:18080
              run: rust/e2e/scripts/run.sh
