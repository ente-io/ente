name: "Test (Rust E2E)"

on:
    pull_request:
        paths:
            - ".github/workflows/rust-e2e-test.yml"
            - "rust/**"
            - "server/**"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    integration:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: rust

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: server/go.mod

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: rust-cli
                  save-if: false

            - name: Install PGlite test dependency
              run: npm ci --prefix crates/test-support/pglite

            - name: Run CLI integration tests
              run: cargo test -p ente-rs --features museum,pglite --locked

            - name: Run E2E suite
              run: cargo test -p ente-e2e --features museum,pglite --locked
