name: "Test (Rust E2E)"

on:
    pull_request:
        paths:
            - ".github/workflows/rust-e2e-test.yml"
            - "rust/**"
            - "server/**"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    integration:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: rust

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup go
              uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
              with:
                  go-version-file: server/go.mod

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: rust-cli
                  save-if: false

            - name: Run CLI integration tests
              run: cargo test -p ente-rs --features museum --locked
              # GITHUB_TOKEN lifts GitHub API rate limit when fetching
              # postgresql_embedded binaries.
              env:
                  GITHUB_TOKEN: ${{ github.token }}

            - name: Run E2E suite
              run: cargo test -p ente-e2e --features museum --locked
