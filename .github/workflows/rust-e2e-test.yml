name: "Test (rust e2e)"

on:
    pull_request:
        paths:
            - "rust/e2e/**"
            - "rust/apps/cli/**"
            - "rust/crates/contacts/**"
            - "rust/crates/core/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - "server/**"
            - ".github/workflows/rust-e2e-test.yml"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Cache cargo artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: ${{ runner.os }}-cargo-rust-e2e-${{ hashFiles('rust/Cargo.lock') }}

            - name: Run rust e2e suite
              env:
                  ENTE_E2E_DOCKER_PROJECT: ente-rust-e2e-${{ github.run_id }}-${{ github.run_attempt }}
                  ENTE_E2E_ENDPOINT: http://localhost:18080
              run: rust/e2e/scripts/run.sh
