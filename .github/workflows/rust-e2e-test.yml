name: "Test (rust e2e)"

on:
    pull_request:
        paths:
            - "rust/e2e/**"
            - "rust/apps/cli/**"
            - "rust/crates/contacts/**"
            - "rust/crates/core/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - "server/**"
            - ".github/workflows/rust-e2e-test.yml"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    cli-integration:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: rust/apps/cli

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v5
              with:
                  go-version-file: server/go.mod

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - run: npm ci --prefix tests/pglite

            - run: cargo test --features museum,pglite --locked

    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Run rust e2e suite
              env:
                  ENTE_E2E_DOCKER_PROJECT: ente-rust-e2e-${{ github.run_id }}-${{ github.run_attempt }}
                  ENTE_E2E_ENDPOINT: http://localhost:18080
              run: rust/e2e/scripts/run.sh
