name: "Deploy (staff)"

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/infra-deploy-staff.yml"
            - "infra/staff/**"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production

        defaults:
            run:
                working-directory: infra/staff

        steps:
            - uses: actions/checkout@v6

            - name: Setup node and enable npm caching
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "infra/staff/package-lock.json"

            - run: npm ci

            - run: npm run build

            - name: Publish
              uses: cloudflare/wrangler-action@v3
              with:
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  command: pages deploy --project-name=ente --commit-dirty=true --branch=deploy/staff infra/staff/dist
