name: "Build (Ensu Android)"

on:
    pull_request:
        paths:
            - "mobile/native/android/apps/ensu/**"
            - "mobile/native/android/packages/rust/**"
            - "rust/apps/codegen/**"
            - "rust/core/**"
            - "rust/ensu/**"
            - "rust/uniffi/**"
            - "rust/.cargo/config.toml"
            - "rust/Cargo.toml"
            - "rust/Cargo.lock"
            - ".github/workflows/ensu-android-build.yml"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Generate UniFFI Kotlin bindings
              working-directory: rust
              run: cargo codegen ensu-android

            - name: Build Ensu
              working-directory: mobile/native/android/apps/ensu
              run: ./gradlew :app-ui:assembleDebug
