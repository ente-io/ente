name: "Build (Ensu Android)"

on:
    pull_request:
        paths:
            - "mobile/native/android/apps/ensu/**"
            - "mobile/native/android/apps/ensu/rust/**"
            - "rust/apps/codegen/**"
            - "rust/crates/core/**"
            - "rust/crates/ensu/**"
            - "rust/bindings/uniffi/**"
            - "rust/.cargo/config.toml"
            - "rust/Cargo.toml"
            - "rust/Cargo.lock"
            - ".github/workflows/ensu-android-build.yml"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: ensu-android
                  save-if: false

            - run: cargo codegen native
              working-directory: rust

            - name: Build Ensu
              working-directory: mobile/native/android/apps/ensu
              run: ./gradlew :app:assembleDebug
