name: "Build (Photos desktop)"

# See .github/docs/app-release.md

on:
    push:
        branches:
            - "release/photos-desktop-v*"
    workflow_dispatch:
    schedule:
        # Run every weekday at ~6:45 AM IST
        - cron: "15 1 * * 1-5"

permissions:
    contents: read

concurrency:
    group: photos-desktop-build
    cancel-in-progress: false

jobs:
    build-metadata:
        runs-on: ubuntu-latest

        outputs:
            should_build: ${{ steps.prepare.outputs.should_build }}
            commit_sha: ${{ steps.prepare.outputs.commit_sha }}
            release_version: ${{ steps.prepare.outputs.release_version }}
            release_tag: ${{ steps.prepare.outputs.release_tag }}
            release_title: ${{ steps.prepare.outputs.release_title }}
            release_body: ${{ steps.prepare.outputs.release_body }}
            release_body_grouped: ${{ steps.prepare.outputs.release_body_grouped }}
            has_new_changes: ${{ steps.prepare.outputs.has_new_changes }}

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.ref_name }}

            - name: Prepare release
              id: prepare
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && git ls-remote --exit-code --heads origin 'release/photos-desktop-v*' >/dev/null 2>&1; then
                      echo "Active Photos desktop release branch found; skipping scheduled nightly"
                      echo "should_build=false" >> "${GITHUB_OUTPUT}"
                      exit 0
                  fi

                  release_version="$(node .github/scripts/photos-desktop-version.mjs get)"

                  if [[ "${GITHUB_REF_NAME}" == release/photos-desktop-v* ]]; then
                      if [[ "${GITHUB_REF_NAME}" != "release/photos-desktop-v${release_version}" ]]; then
                          echo "::error::Branch ${GITHUB_REF_NAME} does not match desktop version ${release_version}"
                          exit 1
                      fi
                      release_tag="photos-desktop-v${release_version}-rc"
                      release_title="🖥️ Photos desktop release candidate - ${release_version}"
                  else
                      release_tag="photos-desktop-v${release_version}"
                      release_title="🖥️ Photos desktop nightly - ${release_version}"
                  fi

                  git fetch --force --depth=1 --no-tags origin "refs/tags/${release_tag}:refs/tags/${release_tag}" || true

                  echo "should_build=true" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
                  echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
                  echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
                  echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
                  node .github/scripts/release-notes.mjs desktop/changes "${release_tag}" >> "${GITHUB_OUTPUT}"

    build:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ${{ matrix.os }}
        environment:
            name: production

        strategy:
            matrix:
                os: [macos-latest, ubuntu-latest, windows-latest]

        env:
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            IS_RC: ${{ startsWith(github.ref_name, 'release/') }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}

        defaults:
            run:
                working-directory: desktop

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "desktop/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Fetch binary dependencies and rebuild native modules
              run: npm run postinstall

            - name: Create universal ffmpeg binaries for macOS
              if: startsWith(matrix.os, 'macos')
              # Currently, the ffmpeg-static binaries are not universal (Not
              # their fault, we thank them for their useful package, the issue
              # is that there don't seem to be well known upstream sources that
              # provide a universal binary).
              #
              # As a workaround, we invoke ffmpeg-static twice to download both
              # the Intel and ARM binaries, and combine them into a single
              # universal binary using lipo.
              #
              run: |
                  rm -f node_modules/ffmpeg-static/ffmpeg
                  npm_config_arch=arm64 node node_modules/ffmpeg-static/install.js
                  mv node_modules/ffmpeg-static/ffmpeg ffmpeg-arm64
                  npm_config_arch=x64 node node_modules/ffmpeg-static/install.js
                  mv node_modules/ffmpeg-static/ffmpeg ffmpeg-x64
                  lipo -create ffmpeg-arm64 ffmpeg-x64 -output node_modules/ffmpeg-static/ffmpeg
                  rm ffmpeg-arm64 ffmpeg-x64
                  file node_modules/ffmpeg-static/ffmpeg

            - name: Install libarchive-tools for pacman build
              if: startsWith(matrix.os, 'ubuntu')
              # https://github.com/electron-userland/electron-builder/issues/4181
              run: sudo apt-get update && sudo apt-get install libarchive-tools

            - name: Build
              run: npm run build:ci

            - name: Mint nightly token
              id: nightly_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: nightly,photos-desktop
                  permission-contents: write

            - name: Publish
              shell: bash
              run: |
                  if [ "${RUNNER_OS}" = "macOS" ]; then
                      export CSC_LINK="${MAC_OS_CERTIFICATE}"
                      export CSC_KEY_PASSWORD="${MAC_OS_CERTIFICATE_PASSWORD}"
                  fi

                  platform=${{ startsWith(matrix.os, 'macos') && 'mac' || startsWith(matrix.os, 'windows') && 'windows' || 'linux' }}

                  if [ "${IS_RC}" = "true" ]; then
                      npm exec -- electron-builder --$platform --publish always "-c.releaseInfo.releaseNotes=${RELEASE_BODY}"
                  else
                      npm exec -- electron-builder --$platform --publish never
                  fi
              env:
                  GH_TOKEN: ${{ steps.nightly_token.outputs.token }}
                  MAC_OS_CERTIFICATE: ${{ secrets.MAC_OS_CERTIFICATE }}
                  MAC_OS_CERTIFICATE_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  # Allow rebuilds to keep updating the rolling RC draft.
                  EP_GH_IGNORE_TIME: true
                  # Workaround recommended in
                  # https://github.com/electron-userland/electron-builder/issues/3179
                  USE_HARD_LINKS: false

            - name: Upload to nightly
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  repo: nightly
                  token: ${{ steps.nightly_token.outputs.token }}
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  artifacts: "desktop/dist/ente-*.@(exe|dmg|AppImage|deb|rpm|pacman)"
                  prerelease: true
                  makeLatest: false
                  allowUpdates: true
                  updateOnlyUnreleased: true

    finish-build:
        needs: [build-metadata, build]
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Point release tag at the successfully built commit
              env:
                  COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: |
                  git tag --force "${RELEASE_TAG}" "${COMMIT_SHA}"
                  git push --force origin "refs/tags/${RELEASE_TAG}"

            - name: Notify Discord
              if: github.event_name != 'schedule' || needs.build-metadata.outputs.has_new_changes == 'true'
              continue-on-error: true
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  RELEASE_TITLE: ${{ needs.build-metadata.outputs.release_title }}
                  RELEASE_BODY_GROUPED: ${{ needs.build-metadata.outputs.release_body_grouped }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: node .github/scripts/release-notify.mjs photos-desktop "${RELEASE_TAG}"
