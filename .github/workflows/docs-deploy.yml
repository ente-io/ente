name: "Deploy (docs)"

on:
    # Run on every push to main that changes docs/
    push:
        branches: [main]
        paths:
            - "docs/**"
            - ".github/workflows/docs-deploy.yml"
    # Also allow manually running the workflow
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: docs

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup node and enable yarn caching
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "yarn"
                  cache-dependency-path: "docs/yarn.lock"

            - name: Activate Yarn 1.22.22
              run: |
                  corepack enable
                  corepack prepare yarn@1.22.22 --activate

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Build production site
              # Will create docs/.vitepress/dist
              run: yarn build

            - name: Prepare deployment with help subdirectory
              run: |
                  mkdir -p deploy
                  mv docs/.vitepress/dist deploy/help

            - name: Publish
              uses: cloudflare/wrangler-action@v3
              with:
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  command: pages deploy --project-name=ente --commit-dirty=true --branch=help-content docs/deploy
