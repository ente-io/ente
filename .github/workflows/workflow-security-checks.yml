name: Workflow security checks

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/scripts/check_workflow_security.rb'

permissions:
  contents: read

jobs:
  workflow-security-checks:
    runs-on: ubuntu-latest
    environment:
      # Require admin approval for workflow changes.
      name: workflow-change-approval
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run workflow security checks
        run: ruby .github/scripts/check_workflow_security.rb
