name: "Push Crowdin translations (web)"

# This is a variant of web-crowdin-sync.yml that uploads the translated strings in
# addition to the source strings.
#
# This allows us to change the strings in our source code for an automated
# refactoring (e.g. renaming a key), and then run this workflow to update the
# data in Crowdin taking our source code as the source of truth.

# USAGE:
#
# Be careful with this workflow since it updates both the sources and
# translations on Crowdin, and any changes on Crowdin that are not in the
# branch from which this workflow is run will be lost.
#
# 1. Run the normal sync workflow:
#   `gh workflow run web-crowdin-sync.yml`
#
# 2. Merge the translations PR it creates. So now `main` includes the latest
#    Crowdin translations.
#
# 3. Branch from updated `main` and make the string edits.
#
# 4. Push the branch and run this workflow
#   `gh workflow run web-crowdin-push-both.yml --ref <branch>`
#
# 5. After it succeeds, merge the string-edit PR.

on:
    # Trigger manually, or using
    # `gh workflow run web-crowdin-push-both.yml --ref <my-branch>`
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    push-both-to-crowdin:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Crowdin push
              uses: crowdin/github-action@v2
              with:
                  base_path: "web/"
                  config: "web/crowdin.yml"
                  upload_sources: true
                  upload_translations: true
                  download_translations: false
                  project_id: 569613
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
