name: "Cache (rust)"

on:
    schedule:
        # 03:00 AM IST.
        - cron: "30 21 * * *"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

env:
    CARGO_INCREMENTAL: "0"

jobs:
    linux:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Restore Rust cache
              id: rust_cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-ubuntu-latest-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
                  restore-keys: |
                      rust-ubuntu-latest-${{ runner.arch }}-

            - name: Install WASM Rust target
              run: rustup target add wasm32-unknown-unknown

            - name: Build Rust workspace
              run: cargo build --workspace --exclude ensu-tauri --all-targets --locked
              working-directory: rust

            - name: Build WASM Rust target
              run: cargo build -p ente-wasm --release --target wasm32-unknown-unknown --locked
              working-directory: rust

            - name: Generate native bindings
              run: cargo codegen native
              working-directory: rust

            - name: Build Ensu Android Rust libraries
              run: ./gradlew :rust:buildRustJniDebug
              working-directory: mobile/native/android/apps/ensu

            - name: Save Rust cache
              if: github.ref == 'refs/heads/main' && steps.rust_cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-ubuntu-latest-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}

    linux-tauri:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Restore Rust cache
              id: rust_cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-ubuntu-22.04-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
                  restore-keys: |
                      rust-ubuntu-22.04-${{ runner.arch }}-

            - name: Prepare Ensu desktop distDir
              run: mkdir -p web/apps/ensu/out

            - name: Build Rust workspace
              run: cargo build --workspace --all-targets --locked
              working-directory: rust

            - name: Save Rust cache
              if: github.ref == 'refs/heads/main' && steps.rust_cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-ubuntu-22.04-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}

    macos-ios:
        runs-on: macos-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Restore Rust cache
              id: rust_cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-macos-latest-${{ runner.arch }}-ios-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
                  restore-keys: |
                      rust-macos-latest-${{ runner.arch }}-ios-

            - name: Generate native bindings
              run: cargo codegen native
              working-directory: rust

            - name: Build Ensu iOS simulator Rust libraries
              run: |
                  SRCROOT="$PWD/mobile/native/darwin/Apps/Ensu" \
                  TARGET_TEMP_DIR="$RUNNER_TEMP/ensu-ios-cache" \
                  PLATFORM_NAME=iphonesimulator \
                  ARCHS="$(uname -m)" \
                  CONFIGURATION=Debug \
                  IPHONEOS_DEPLOYMENT_TARGET=16.0 \
                  bash mobile/native/darwin/Apps/Ensu/scripts/build-rust.sh

            - name: Save Rust cache
              if: github.ref == 'refs/heads/main' && steps.rust_cache.outputs.cache-hit != 'true'
              uses: actions/cache/save@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-macos-latest-${{ runner.arch }}-ios-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
