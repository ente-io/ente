name: "Lint (Web)"

on:
    # Run on every pull request (open or push to it) that changes web/
    pull_request:
        paths:
            - "web/**"
            - "rust/bindings/wasm/ente-wasm/**"
            - "rust/crates/contacts/**"
            - "rust/crates/core/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - ".github/workflows/web-lint.yml"

permissions:
    contents: read

# Cancel in-progress lint runs when a new commit is pushed.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: web
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "web/package-lock.json"

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: rust-wasm
                  save-if: false

            - run: npm ci

            - run: npm audit --audit-level critical

            - run: npm run build:wasm

            - run: npm run lint

            - run: npm test
