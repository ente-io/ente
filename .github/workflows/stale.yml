name: Stale PRs

on:
    schedule:
        - cron: "0 3 * * *"
    workflow_dispatch:

permissions:
    issues: write
    pull-requests: write
    statuses: read

jobs:
    stale:
        runs-on: ubuntu-latest
        steps:
            - name: Close pull requests missing CLA
              uses: actions/github-script@v8
              with:
                  script: |
                      const repo = context.repo;
                      const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;

                      for (const pr of await github.paginate(github.rest.pulls.list, {
                          ...repo,
                          state: "open",
                          per_page: 100,
                      })) {
                          if (Date.parse(pr.created_at) > cutoff) continue;

                          const { data: { statuses } } = await github.rest.repos.getCombinedStatusForRef({
                              ...repo,
                              ref: pr.head.sha,
                          });
                          if (!statuses.some((status) => status.context === "license/cla" && status.state === "pending")) continue;

                          await github.rest.issues.createComment({
                              ...repo,
                              issue_number: pr.number,
                              body: "This pull request has been automatically closed because the CLA has not been signed for 7 days. Reopen it after signing.",
                          });
                          await github.rest.pulls.update({
                              ...repo,
                              pull_number: pr.number,
                              state: "closed",
                          });
                      }

            - name: Mark and close stale pull requests
              uses: actions/stale@v10
              with:
                  days-before-pr-stale: 30
                  days-before-pr-close: 7
                  days-before-issue-stale: -1
                  days-before-issue-close: -1
                  stale-pr-message: >
                      This pull request has been automatically marked as stale
                      because it has had no activity for 30 days. It will be
                      closed in 7 days if there is no further activity.
                  close-pr-message: >
                      This pull request has been automatically closed because it
                      remained stale for 7 days with no activity. Reopen it if
                      you want to continue working on it.
