name: "Lint (photos)"

on:
    # Run on every pull request (open or push to it) that changes the photos app,
    # Photos Rust, or shared Rust crates used by Photos
    pull_request:
        paths:
            - "mobile/apps/photos/**"
            - "rust/crates/photos/**"
            - "rust/crates/core/**"
            - "rust/crates/contacts/**"
            - "rust/crates/image/**"
            - "rust/bindings/frb/**"
            - "rust/apps/codegen/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - ".github/workflows/mobile-lint.yml"
            - "mobile/scripts/check_source_arb_plurals.rb"

env:
    FLUTTER_VERSION: "3.38.10"

permissions:
    contents: read

jobs:
    photos-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: mobile/apps/photos
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Verify frozen mobile pubspecs
              run: ruby mobile/scripts/check_frozen_pubspecs.rb mobile/apps/photos
              working-directory: ${{ github.workspace }}

            - name: Verify source ARB plurals
              run: ruby mobile/scripts/check_source_arb_plurals.rb
              working-directory: ${{ github.workspace }}

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - run: flutter pub get --enforce-lockfile

            - run: cargo codegen frb
              working-directory: rust

            - run: cargo clippy -p ente_photos_rust --features flutter --all-targets --locked -- -D warnings
              working-directory: rust

            - run: flutter analyze --no-fatal-infos

            - name: Run Flutter tests
              run: flutter test
