name: "Lint (photos)"

on:
    # Run on every pull request (open or push to it) that changes the photos app,
    # Photos Rust, or shared Rust crates used by Photos
    pull_request:
        paths:
            - "mobile/apps/photos/**"
            - "rust/photos/**"
            - "rust/core/**"
            - "rust/contacts/**"
            - "rust/crates/image/**"
            - ".github/workflows/mobile-lint.yml"
            - "mobile/scripts/check_source_arb_plurals.rb"

env:
    FLUTTER_VERSION: "3.32.8"
    RUST_VERSION: "1.90.0"
    RUSTFLAGS: -D warnings

permissions:
    contents: read

jobs:
    photos-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: mobile/apps/photos
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Detect Rust changes
              id: rust_changes
              shell: bash
              run: |
                  ente_rust=false
                  ente_photos_rust=false

                  while IFS= read -r file; do
                      case "$file" in
                          .github/workflows/mobile-lint.yml|mobile/packages/rust/*|rust/core/*|rust/contacts/*)
                              ente_rust=true
                              ;;
                      esac

                      case "$file" in
                          .github/workflows/mobile-lint.yml|mobile/apps/photos/rust/*|mobile/apps/photos/rust_builder/*|rust/photos/*|rust/crates/image/*)
                              ente_photos_rust=true
                              ;;
                      esac
                  done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD")

                  echo "ente_rust=$ente_rust" >> "$GITHUB_OUTPUT"
                  echo "ente_photos_rust=$ente_photos_rust" >> "$GITHUB_OUTPUT"

                  if [[ "$ente_rust" == "true" || "$ente_photos_rust" == "true" ]]; then
                      echo "any=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "any=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Verify frozen mobile pubspecs
              run: ruby mobile/scripts/check_frozen_pubspecs.rb mobile/apps/photos
              working-directory: ${{ github.workspace }}

            - name: Verify source ARB plurals
              run: ruby mobile/scripts/check_source_arb_plurals.rb
              working-directory: ${{ github.workspace }}

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - name: Install Rust ${{ env.RUST_VERSION }}
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
                  components: rustfmt,clippy

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      mobile/packages/rust/rust/target
                      mobile/apps/photos/rust/target
                  key: ${{ runner.os }}-cargo-mobile-${{ hashFiles('mobile/**/Cargo.lock') }}

            - run: flutter pub get --enforce-lockfile

            - name: Install Flutter Rust Bridge
              run: cargo install flutter_rust_bridge_codegen

            - name: Generate Rust bindings (Core)
              run: flutter_rust_bridge_codegen generate
              working-directory: mobile/packages/rust

            - name: Generate Rust bindings
              run: flutter_rust_bridge_codegen generate

            - run: flutter analyze --no-fatal-infos

            - name: Run Flutter tests
              run: flutter test

            - name: Check formatting (ente_rust)
              if: steps.rust_changes.outputs.ente_rust == 'true'
              working-directory: mobile/packages/rust/rust
              run: cargo fmt -- src/frb_generated.rs && cargo fmt --check

            - name: Run clippy (ente_rust)
              if: steps.rust_changes.outputs.ente_rust == 'true'
              working-directory: mobile/packages/rust/rust
              run: cargo clippy --all-targets --all-features

            - name: Build (ente_rust)
              if: steps.rust_changes.outputs.ente_rust == 'true'
              working-directory: mobile/packages/rust/rust
              run: cargo build

            - name: Test (ente_rust)
              if: steps.rust_changes.outputs.ente_rust == 'true'
              working-directory: mobile/packages/rust/rust
              run: cargo test

            - name: Check formatting (ente_photos_rust)
              if: steps.rust_changes.outputs.ente_photos_rust == 'true'
              working-directory: mobile/apps/photos/rust
              run: cargo fmt -- src/frb_generated.rs && cargo fmt --check

            - name: Run clippy (ente_photos_rust)
              if: steps.rust_changes.outputs.ente_photos_rust == 'true'
              working-directory: mobile/apps/photos/rust
              run: cargo clippy --all-targets --all-features

            - name: Build (ente_photos_rust)
              if: steps.rust_changes.outputs.ente_photos_rust == 'true'
              working-directory: mobile/apps/photos/rust
              run: cargo build

            - name: Test (ente_photos_rust)
              if: steps.rust_changes.outputs.ente_photos_rust == 'true'
              working-directory: mobile/apps/photos/rust
              run: cargo test
