name: "Lint (Mobile)"

on:
    pull_request:
        paths:
            - ".github/workflows/mobile-lint.yml"
            - "mobile/**"
            - "rust/apps/codegen/**"
            - "rust/bindings/frb/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - "rust/crates/contacts/**"
            - "rust/crates/core/**"
            - "rust/crates/image/**"
            - "rust/crates/photos/**"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  submodules: recursive

            - name: Verify frozen mobile pubspecs
              run: ruby mobile/scripts/check_frozen_pubspecs.rb mobile

            - name: Verify source ARB plurals
              run: ruby mobile/scripts/check_source_arb_plurals.rb

            - name: Verify auth custom icons
              run: |
                  find assets/custom-icons -type f -name "*.svg" | while read -r file; do
                      name=$(basename "$file")
                      if [[ "$name" != "$(printf "%s" "$name" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')" ]]; then
                          echo "File name is not lowercase: $file"
                          exit 1
                      fi

                      if [[ "$file" == "assets/custom-icons/icons/bbs_nga.svg" ]]; then
                          continue
                      fi

                      size=$(wc -c < "$file")
                      if (( size > 20480 )); then
                          echo "File size is greater than 20KB: $file ($size bytes)"
                          exit 1
                      fi
                  done

                  jq empty assets/custom-icons/_data/custom-icons.json
                  jq -r '.icons[] | select(.hex != null) | .hex' assets/custom-icons/_data/custom-icons.json | while read -r hex; do
                      if [[ -n "$hex" && ! "$hex" =~ ^[0-9a-fA-F]{6}$ ]]; then
                          echo "Invalid hex color '$hex'. Must be exactly 6 hexadecimal characters."
                          exit 1
                      fi
                  done
              working-directory: mobile/apps/auth

            - name: Install Flutter
              uses: ./.github/actions/setup-flutter

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: rust-flutter
                  save-if: false

            - run: cargo codegen frb
              working-directory: rust

            - run: cargo clippy -p ente_photos_rust --features flutter --all-targets --locked -- -D warnings
              working-directory: rust

            - run: cargo clippy -p ente_rust --features flutter --all-targets --locked -- -D warnings
              working-directory: rust

            - name: Generate strings localizations
              run: flutter gen-l10n
              working-directory: mobile/packages/strings

            - name: Lint packages
              run: |
                  for pubspec in mobile/packages/*/pubspec.yaml; do
                      package_dir=${pubspec%/pubspec.yaml}
                      package=${package_dir##*/}
                      echo "Linting $package"
                      (
                          cd "$package_dir"
                          flutter pub get --enforce-lockfile
                          dart format --output=none --set-exit-if-changed .
                          flutter analyze
                          if [[ -d test ]]; then
                              flutter test
                          fi
                      )
                  done

            - name: Lint apps
              run: |
                  for app in photos auth locker; do
                      echo "Linting $app"
                      (
                          cd "mobile/apps/$app"
                          flutter pub get --enforce-lockfile
                          if [[ "$app" != "photos" ]]; then
                              flutter gen-l10n
                          fi
                          dart format --output=none --set-exit-if-changed .
                          flutter analyze
                          flutter test
                      )
                  done
