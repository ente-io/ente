name: "Push sources to Crowdin (Mobile)"

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/mobile-crowdin-push-sources.yml"
            - "mobile/apps/photos/lib/l10n/intl_en.arb"
            - "mobile/apps/photos/crowdin.yml"
            - "mobile/apps/auth/lib/l10n/arb/app_en.arb"
            - "mobile/apps/auth/crowdin.yml"
            - "mobile/apps/locker/lib/l10n/app_en.arb"
            - "mobile/apps/locker/crowdin.yml"

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    push-sources-to-crowdin:
        name: "Push ${{ matrix.app }} sources"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - app: photos
                      base_path: "mobile/apps/photos/"
                      config: "mobile/apps/photos/crowdin.yml"
                      project_id: 574741
                    - app: auth
                      base_path: "mobile/apps/auth/"
                      config: "mobile/apps/auth/crowdin.yml"
                      project_id: 575169
                    - app: locker
                      base_path: "mobile/apps/locker/"
                      config: "mobile/apps/locker/crowdin.yml"
                      project_id: 860056

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Crowdin push
              uses: crowdin/github-action@52aa776766211d83d975df51f3b9c53c2f8ba35f # v2.16.3
              with:
                  base_path: ${{ matrix.base_path }}
                  config: ${{ matrix.config }}
                  upload_sources: true
                  upload_translations: false
                  download_translations: false
                  project_id: ${{ matrix.project_id }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
