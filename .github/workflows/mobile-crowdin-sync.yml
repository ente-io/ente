name: "Sync Crowdin (mobile)"

on:
    schedule:
        # Run Mondays at ~6:20 AM IST
        # See: [Note: Run workflow on specific days of the week]
        - cron: "50 0 * * 1"
    # Also allow manually running the workflow.
    workflow_dispatch:
        inputs:
            app:
                description: "Mobile app to sync"
                required: true
                default: "all"
                type: choice
                options:
                    - all
                    - photos
                    - auth
                    - locker

permissions:
    contents: write
    pull-requests: write

jobs:
    synchronize-with-crowdin:
        name: "Sync ${{ matrix.app }} with Crowdin"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - app: photos
                      base_path: "mobile/apps/photos/"
                      config: "mobile/apps/photos/crowdin.yml"
                      project_id: 574741
                      localization_branch_name: translations/photos
                      pull_request_title: "[mobile/photos] New translations"
                      pull_request_body: "New translations from [Crowdin](https://crowdin.com/project/ente-photos-app)"
                    - app: auth
                      base_path: "mobile/apps/auth/"
                      config: "mobile/apps/auth/crowdin.yml"
                      project_id: 575169
                      localization_branch_name: translations/auth
                      pull_request_title: "[mobile/auth] New translations"
                      pull_request_body: "New translations from [Crowdin](https://crowdin.com/project/ente-authenticator-app)"
                    - app: locker
                      base_path: "mobile/apps/locker/"
                      config: "mobile/apps/locker/crowdin.yml"
                      project_id: 860056
                      localization_branch_name: translations/locker
                      pull_request_title: "[mobile/locker] New translations"
                      pull_request_body: "New translations from [Crowdin](https://crowdin.com/project/ente-locker)"

        steps:
            - name: Checkout
              if: ${{ github.event_name != 'workflow_dispatch' || inputs.app == 'all' || inputs.app == matrix.app }}
              uses: actions/checkout@v6

            - name: Crowdin's action
              if: ${{ github.event_name != 'workflow_dispatch' || inputs.app == 'all' || inputs.app == matrix.app }}
              uses: crowdin/github-action@v2
              with:
                  base_path: ${{ matrix.base_path }}
                  config: ${{ matrix.config }}
                  upload_sources: true
                  upload_translations: false
                  download_translations: true
                  localization_branch_name: ${{ matrix.localization_branch_name }}
                  create_pull_request: true
                  pull_request_title: ${{ matrix.pull_request_title }}
                  pull_request_body: ${{ matrix.pull_request_body }}
                  pull_request_base_branch_name: "main"
                  project_id: ${{ matrix.project_id }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
