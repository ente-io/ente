name: "Internal release (locker mobile)"

on:
    workflow_dispatch: # Allow manually running the action

env:
    FLUTTER_VERSION: "3.32.8"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: mobile/apps/locker

        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup JDK 17
              uses: actions/setup-java@v1
              with:
                  java-version: 17

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - name: Generate strings localizations
              run: flutter gen-l10n
              working-directory: mobile/packages/strings

            - name: Increment version code for build
              run: |
                  CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
                  VERSION_NAME=$(echo "$CURRENT_VERSION" | cut -d'+' -f1)
                  CURRENT_BUILD=$(echo "$CURRENT_VERSION" | cut -d'+' -f2)
                  NEW_VERSION_CODE=$((CURRENT_BUILD + ${{ github.run_number }}))
                  NEW_VERSION="${VERSION_NAME}+${NEW_VERSION_CODE}"

                  sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
                  echo "Building with version ${NEW_VERSION}"

                  echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
                  echo "NEW_VERSION_CODE=${NEW_VERSION_CODE}" >> $GITHUB_ENV

            - name: Prepare and validate changelog for Play Store
              run: |
                  mkdir -p whatsnew
                  CHANGELOG_FILE="scripts/store_changes.txt"
                  DISCORD_FILE="scripts/internal_changes.txt"
                  OUTPUT_FILE="whatsnew/whatsnew-en-US"

                  if [ -f "$CHANGELOG_FILE" ]; then
                      head -c 500 "$CHANGELOG_FILE" > "$OUTPUT_FILE"
                  else
                      echo "Bug fixes and improvements" > "$OUTPUT_FILE"
                  fi

                  if [ ! -s "$OUTPUT_FILE" ]; then
                      echo "Changelog is empty."
                      exit 1
                  fi

                  LENGTH=$(wc -m < "$OUTPUT_FILE")
                  if [ "$LENGTH" -gt 500 ]; then
                      echo "Changelog exceeds 500 characters ($LENGTH)."
                      exit 1
                  fi

                  if grep -Eq '[\*\_\<\>\[\]\(\)]' "$OUTPUT_FILE"; then
                      echo "Changelog contains markdown or HTML formatting."
                      exit 1
                  fi

                  echo "Validated Play Store changelog:"
                  cat "$OUTPUT_FILE"

                  CHANGELOG_PLAYSTORE=$(cat "$OUTPUT_FILE" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
                  echo "CHANGELOG=${CHANGELOG_PLAYSTORE}" >> $GITHUB_ENV

                  if [ -f "$DISCORD_FILE" ]; then
                      CHANGELOG_DISCORD=$(cat "$DISCORD_FILE" | sed 's/"/\\"/g')
                  else
                      CHANGELOG_DISCORD=$(cat "$OUTPUT_FILE" | sed 's/"/\\"/g')
                  fi
                  echo "CHANGELOG_DISCORD<<EOF" >> $GITHUB_ENV
                  echo "$CHANGELOG_DISCORD" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Setup keys
              uses: timheuer/base64-to-file@v1
              with:
                  fileName: "keystore/ente_locker_key.jks"
                  encodedString: ${{ secrets.SIGNING_KEY_LOCKER }}

            - name: Build PlayStore AAB
              run: |
                  flutter build appbundle --dart-define=cronetHttpNoPlay=true --release --flavor playstore
              env:
                  SIGNING_KEY_PATH: "/home/runner/work/_temp/keystore/ente_locker_key.jks"
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_LOCKER }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_LOCKER }}
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_LOCKER }}

            - name: Upload AAB to PlayStore
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON_LOCKER }}
                  packageName: io.ente.locker
                  releaseFiles: mobile/apps/locker/build/app/outputs/bundle/playstoreRelease/app-playstore-release.aab
                  track: internal
                  whatsNewDirectory: mobile/apps/locker/whatsnew
                  mappingFile: mobile/apps/locker/build/app/outputs/mapping/playstoreRelease/mapping.txt

            - name: Notify Discord
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  nodetail: true
                  title: "🔒 Internal release available for Locker v${{ env.NEW_VERSION }}"
                  description: |
                      **Version:** ${{ env.NEW_VERSION }}
                      **Flutter:** ${{ env.FLUTTER_VERSION }}
                      **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
                      **Download:** [Play Store](https://play.google.com/store/apps/details?id=io.ente.locker)
                      **Changes:**
                      ${{ env.CHANGELOG_DISCORD }}
                  color: 0x4CAF50
