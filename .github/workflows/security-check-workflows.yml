name: Security - Check Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  check-privileged-workflow-patterns:
    runs-on: ubuntu-latest
    environment:
      name: workflow-security-review
      # This requires admin approval in repository settings
    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check workflow security guardrails
        shell: bash
        run: |
          extract_sensitive_triggers() {
            local revision=$1
            local file=$2

            if ! git cat-file -e "${revision}:${file}" 2>/dev/null; then
              return 0
            fi

            git show "${revision}:${file}" | ruby -e '
              require "date"
              require "yaml"

              sensitive = %w[
                pull_request_target
                issue_comment
                pull_request_review_comment
                discussion_comment
                workflow_run
              ]

              workflow = YAML.safe_load(
                STDIN.read,
                aliases: true,
                permitted_classes: [Date, Time, DateTime]
              ) || {}
              events = case workflow["on"] || workflow[true]
              when String
                [workflow["on"] || workflow[true]]
              when Array
                (workflow["on"] || workflow[true]).grep(String)
              when Hash
                (workflow["on"] || workflow[true]).keys.map(&:to_s)
              else
                []
              end

              puts events.select { |event| sensitive.include?(event) }.uniq.sort
            '
          }

          extract_unpinned_third_party_actions() {
            local revision=$1
            local file=$2

            if ! git cat-file -e "${revision}:${file}" 2>/dev/null; then
              return 0
            fi

            git show "${revision}:${file}" | ruby -e '
              FULL_SHA = /\A[0-9a-f]{40}\z/

              refs = STDIN.read.scan(
                /^\s*-?\s*uses:\s*([A-Za-z0-9._-]+\/[A-Za-z0-9._-]+(?:\/[A-Za-z0-9._\/-]+)?)@([^\s#]+)/
              )
              refs.each do |action, ref|
                next if action.start_with?("actions/")
                next if ref.match?(FULL_SHA)

                puts "#{action}@#{ref}"
              end
            ' | sort -u
          }

          mapfile -t modified_workflows < <(
            git diff --name-only --diff-filter=AMR "origin/${{ github.base_ref }}...HEAD" |
            grep -E '^\.github/workflows/.*\.ya?ml$' || true
          )

          if [ "${#modified_workflows[@]}" -eq 0 ]; then
            echo "No workflow files modified"
            exit 0
          fi

          printf 'Checking modified workflows:\n'
          printf ' - %s\n' "${modified_workflows[@]}"

          sensitive_triggers=(
            "pull_request_target"
            "issue_comment"
            "pull_request_review_comment"
            "discussion_comment"
            "workflow_run"
          )
          violations=()
          unpinned_violations=()

          for file in "${modified_workflows[@]}"; do
            if ! current_triggers=$(extract_sensitive_triggers HEAD "$file"); then
              echo "❌ ERROR: Failed to parse workflow triggers in HEAD:$file"
              exit 1
            fi

            if ! base_triggers=$(extract_sensitive_triggers "origin/${{ github.base_ref }}" "$file"); then
              echo "❌ ERROR: Failed to parse workflow triggers in origin/${{ github.base_ref }}:$file"
              exit 1
            fi

            for trigger in "${sensitive_triggers[@]}"; do
              if grep -Fxq "$trigger" <<< "$current_triggers"; then
                if grep -Fxq "$trigger" <<< "$base_triggers"; then
                  echo "✓ $file: ${trigger} already existed (allowed)"
                else
                  echo "✗ $file: NEW ${trigger} trigger detected!"
                  violations+=("$file:${trigger}")
                fi
              fi
            done

            if ! current_unpinned=$(extract_unpinned_third_party_actions HEAD "$file"); then
              echo "❌ ERROR: Failed to parse action refs in HEAD:$file"
              exit 1
            fi

            if ! base_unpinned=$(extract_unpinned_third_party_actions "origin/${{ github.base_ref }}" "$file"); then
              echo "❌ ERROR: Failed to parse action refs in origin/${{ github.base_ref }}:$file"
              exit 1
            fi

            while IFS= read -r action_ref; do
              [ -z "$action_ref" ] && continue

              if grep -Fxq "$action_ref" <<< "$base_unpinned"; then
                echo "✓ $file: ${action_ref} already existed unpinned (allowed for now)"
              else
                echo "✗ $file: NEW unpinned third-party action ${action_ref} detected!"
                unpinned_violations+=("$file:${action_ref}")
              fi
            done <<< "$current_unpinned"
          done

          if [ "${#violations[@]}" -gt 0 ]; then
            echo ""
            echo "❌ ERROR: New privileged workflow triggers detected:"
            printf ' - %s\n' "${violations[@]}"
            echo ""
            echo "These triggers can execute with repository trust or be chained"
            echo "from untrusted pull requests into privileged automation."
            echo ""
            echo "If you need to add one of these triggers, please:"
            echo "1. Discuss with maintainers first"
            echo "2. Ensure the workflow never executes untrusted PR code with write tokens or secrets"
            echo "3. Get explicit approval before merging"
            exit 1
          fi

          if [ "${#unpinned_violations[@]}" -gt 0 ]; then
            echo ""
            echo "❌ ERROR: New unpinned third-party workflow actions detected:"
            printf ' - %s\n' "${unpinned_violations[@]}"
            echo ""
            echo "Pin third-party actions to a full commit SHA before merging."
            exit 1
          fi

          echo "✓ No new privileged triggers or unpinned third-party actions detected"
