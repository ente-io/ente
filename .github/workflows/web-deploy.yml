name: "Deploy (web)"

on:
    schedule:
        # [Note: Run workflow every 24 hours]
        #
        # Run every weekday at ~8:00 AM IST.
        #
        # First field is minute, second is hour of the day. Last is day of week,
        # 0 being Sunday.
        #
        # Add a few minutes of offset to avoid scheduling on exact hourly
        # boundaries (recommended by GitHub to avoid congestion).
        #
        # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
        # https://crontab.guru/
        #
        - cron: "25 2 * * 1-5"
    # Also allow manually running the workflow
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: web

        env:
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup node and enable yarn caching
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "yarn"
                  cache-dependency-path: "web/yarn.lock"

            - name: Activate Yarn 1.22.22
              run: |
                  corepack enable
                  corepack prepare yarn@1.22.22 --activate

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Audit dependencies
              run: |
                  yarn audit --level critical || exit_code=$?
                  if [[ $exit_code -ge 16 ]]; then
                      echo "::error::Yarn audit found critical issues"
                      exit 1
                  fi

            - name: Deploy photos
              uses: ./.github/actions/deploy-web-app
              with:
                  app: photos

            - name: Deploy albums
              uses: ./.github/actions/deploy-web-app
              with:
                  app: albums

            - name: Deploy accounts
              uses: ./.github/actions/deploy-web-app
              with:
                  app: accounts

            - name: Deploy auth
              uses: ./.github/actions/deploy-web-app
              with:
                  app: auth

            - name: Deploy legacy
              uses: ./.github/actions/deploy-web-app
              with:
                  app: legacy

            - name: Deploy cast
              uses: ./.github/actions/deploy-web-app
              with:
                  app: cast

            - name: Deploy payments
              uses: ./.github/actions/deploy-web-app
              with:
                  app: payments
                  output: dist

            - name: Deploy locker
              uses: ./.github/actions/deploy-web-app
              with:
                  app: locker

            - name: Deploy share
              uses: ./.github/actions/deploy-web-app
              with:
                  app: share

            - name: Deploy memories
              uses: ./.github/actions/deploy-web-app
              with:
                  app: memories

            - name: Deploy paste
              uses: ./.github/actions/deploy-web-app
              with:
                  app: paste

            - name: Deploy embed
              uses: ./.github/actions/deploy-web-app
              with:
                  app: embed

            - name: Deploy ensu
              uses: ./.github/actions/deploy-web-app
              with:
                  app: ensu
