name: "Lint (Photos desktop)"

on:
    pull_request:
        paths:
            - ".github/workflows/desktop-lint.yml"
            - "desktop/**"

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: desktop
        steps:
            - uses: actions/checkout@v6

            - name: Setup node and enable npm caching
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "desktop/package-lock.json"

            - run: npm ci

            - run: npm run lint
