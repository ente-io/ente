name: "Build (Ensu iOS)"

on:
    pull_request:
        paths:
            - "mobile/native/darwin/Apps/Ensu/**"
            - "mobile/native/darwin/Packages/**"
            - "rust/apps/codegen/**"
            - "rust/crates/core/**"
            - "rust/crates/ensu/**"
            - "rust/bindings/uniffi/**"
            - "rust/.cargo/config.toml"
            - "rust/Cargo.toml"
            - "rust/Cargo.lock"
            - ".github/workflows/ensu-ios-build.yml"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-and-test:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            # Restore-only; primed on main by warm-caches.yml.
            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
              with:
                  workspaces: rust
                  shared-key: ensu-ios
                  save-if: false

            - run: cargo codegen native
              working-directory: rust

            # This pull_request workflow does not provide the inference fixtures,
            # so this step is only a build + startup smoke test.
            - name: Build and test Ensu
              working-directory: mobile/native/darwin/Apps/Ensu
              run: xcodebuild test -scheme Ensu -destination 'platform=iOS Simulator,name=iPhone 17'
