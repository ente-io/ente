name: "Lint (rust)"

on:
    # Run on every pull request (open or push to it) that changes Rust code
    #
    # See also: rust-lint-cli.yml
    pull_request:
        paths:
            - "rust/crates/core/**"
            - "rust/crates/contacts/**"
            - "rust/crates/image/**"
            - "rust/bindings/wasm/ente-wasm/**"
            - "rust/crates/photos/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - ".github/workflows/rust-lint.yml"

permissions:
    contents: read

# Cancel in-progress lint runs when a new commit is pushed.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

            - name: Check formatting (core)
              working-directory: rust
              run: cargo fmt --check -p ente-core

            - name: Run clippy (core)
              working-directory: rust
              run: cargo clippy -p ente-core --all-targets --all-features

            - name: Build (core)
              working-directory: rust
              run: cargo build -p ente-core

            - name: Test (core)
              working-directory: rust
              run: cargo test -p ente-core

            - name: Check formatting (photos)
              working-directory: rust
              run: cargo fmt --check -p ente_photos

            - name: Run clippy (photos)
              working-directory: rust
              run: cargo clippy -p ente_photos --all-targets --all-features

            - name: Build (photos)
              working-directory: rust
              run: cargo build -p ente_photos

            - name: Test (photos)
              working-directory: rust
              run: cargo test -p ente_photos

            - name: Check formatting (wasm)
              working-directory: rust
              run: cargo fmt --check -p ente-wasm

            - name: Run clippy (wasm)
              working-directory: rust
              run: cargo clippy -p ente-wasm --all-targets --all-features

            - name: Build (wasm)
              working-directory: rust
              run: cargo build -p ente-wasm

            - name: Test (wasm)
              working-directory: rust
              run: cargo test -p ente-wasm
