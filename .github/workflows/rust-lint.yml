name: "Lint (rust)"

on:
    pull_request:
        paths:
            - "rust/**"
            - ".github/workflows/rust-lint.yml"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    lint:
        runs-on: ubuntu-22.04
        defaults:
            run:
                working-directory: rust
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Restore Rust cache
              uses: actions/cache/restore@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/target
                  key: rust-ubuntu-22.04-${{ runner.arch }}-

            - name: Prepare Ensu desktop distDir
              run: mkdir -p ../web/apps/ensu/out

            - run: cargo codegen frb

            - run: cargo fmt --all --check

            - run: cargo clippy --workspace --all-targets --all-features --locked

            - run: cargo test --workspace --locked
