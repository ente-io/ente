name: "Lint (rust)"

on:
    pull_request:
        paths:
            - "rust/**"
            - ".github/workflows/rust-lint.yml"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    RUSTFLAGS: -D warnings

jobs:
    lint:
        # Tauri v1 still needs WebKitGTK 4.0, which Ubuntu 24.04 no longer ships.
        runs-on: ubuntu-22.04
        env:
            CXX: g++-12
        defaults:
            run:
                working-directory: rust
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y g++-12 libwebkit2gtk-4.0-dev libsoup2.4-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Prepare Ensu desktop distDir
              run: mkdir -p ../web/apps/ensu/out

            - run: cargo fmt --all --check

            - run: cargo clippy --workspace --all-targets --locked

            - run: cargo test --workspace --locked
