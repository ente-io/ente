name: "Lint (staff)"

on:
    # Run on every pull request (open or push to it) that changes infra/staff/
    pull_request:
        paths:
            - "infra/staff/**"
            - ".github/workflows/infra-deploy-staff.yml"

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: infra/staff

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup node and enable npm caching
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "infra/staff/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint
