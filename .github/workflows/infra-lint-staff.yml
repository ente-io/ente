name: "Lint (Staff)"

on:
    pull_request:
        paths:
            - ".github/workflows/infra-lint-staff.yml"
            - "infra/staff/**"

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: infra/staff

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Setup node and enable npm caching
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "infra/staff/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint
