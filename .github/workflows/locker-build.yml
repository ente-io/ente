name: "Build (Locker)"

# See .github/docs/app-release.md

on:
    push:
        branches:
            - "release/locker-v*"
    workflow_dispatch:
    schedule:
        # Run every weekday at ~4:45 AM IST
        - cron: "15 23 * * 0-4"

env:
    FLUTTER_VERSION: "3.38.10"

permissions:
    contents: write

concurrency:
    group: locker-build
    cancel-in-progress: false

jobs:
    build-metadata:
        runs-on: ubuntu-latest

        outputs:
            should_build: ${{ steps.prepare.outputs.should_build }}
            commit_sha: ${{ steps.prepare.outputs.commit_sha }}
            build_number: ${{ steps.prepare.outputs.build_number }}
            release_version: ${{ steps.prepare.outputs.release_version }}
            release_tag: ${{ steps.prepare.outputs.release_tag }}
            release_title: ${{ steps.prepare.outputs.release_title }}
            release_body: ${{ steps.prepare.outputs.release_body }}
            release_body_grouped: ${{ steps.prepare.outputs.release_body_grouped }}
            has_new_changes: ${{ steps.prepare.outputs.has_new_changes }}
            play_store_release_notes: ${{ steps.prepare.outputs.play_store_release_notes }}
            artifact_stem: ${{ steps.prepare.outputs.artifact_stem }}

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ github.ref_name }}

            - name: Prepare release
              id: prepare
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && git ls-remote --exit-code --heads origin 'release/locker-v*' >/dev/null 2>&1; then
                      echo "Active Locker release branch found; skipping scheduled nightly"
                      echo "should_build=false" >> "${GITHUB_OUTPUT}"
                      exit 0
                  fi

                  release_version="$(node .github/scripts/flutter-version.mjs locker get)"
                  build_number_base="$(node .github/scripts/flutter-version.mjs locker get-build-base)"
                  build_number=$((build_number_base + GITHUB_RUN_NUMBER))

                  if [[ "${GITHUB_REF_NAME}" == release/locker-v* ]]; then
                      if [[ "${GITHUB_REF_NAME}" != "release/locker-v${release_version}" ]]; then
                          echo "::error::Branch ${GITHUB_REF_NAME} does not match Locker version ${release_version}"
                          exit 1
                      fi
                      release_tag="locker-v${release_version}-rc"
                      release_title="🗄️ Locker release candidate - ${release_version} (build ${build_number})"
                  else
                      release_tag="locker-v${release_version}-beta"
                      release_title="🗄️ Locker nightly - ${release_version} (build ${build_number})"
                  fi

                  commit_sha="$(git rev-parse HEAD)"
                  git fetch --force --depth=1 --no-tags origin "refs/tags/${release_tag}:refs/tags/${release_tag}" || true

                  echo "should_build=true" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"
                  echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
                  echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
                  echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
                  echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
                  echo "artifact_stem=ente-${release_tag%-rc}" >> "${GITHUB_OUTPUT}"
                  node .github/scripts/release-notes.mjs mobile/apps/locker/changes "${release_tag}" >> "${GITHUB_OUTPUT}"

    build-android:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        environment:
            name: production
        env:
            COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
            BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
            RELEASE_VERSION: ${{ needs.build-metadata.outputs.release_version }}
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}
            PLAY_STORE_RELEASE_NOTES: ${{ needs.build-metadata.outputs.play_store_release_notes }}
            ARTIFACT_STEM: ${{ needs.build-metadata.outputs.artifact_stem }}

        defaults:
            run:
                working-directory: mobile/apps/locker

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup JDK 17
              uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Install Flutter ${{ env.FLUTTER_VERSION }}
              uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION }}

            - name: Generate strings localizations
              run: flutter gen-l10n
              working-directory: mobile/packages/strings

            - name: Set build version
              run: node ../../../.github/scripts/flutter-version.mjs locker set-build "${RELEASE_VERSION}" "${BUILD_NUMBER}"

            - name: Resolve dependencies with lockfile enforcement
              run: flutter pub get --enforce-lockfile

            - run: cargo codegen frb shared
              working-directory: rust

            - name: Prepare whatsnew
              run: |
                  mkdir -p whatsnew
                  printf '%s' "${PLAY_STORE_RELEASE_NOTES}" > whatsnew/whatsnew-en-US

            - name: Add keystore
              run: printf '%s' "${SIGNING_KEY_LOCKER}" | base64 -d > "$RUNNER_TEMP/ente_locker_key.jks"
              env:
                  SIGNING_KEY_LOCKER: ${{ secrets.SIGNING_KEY_LOCKER }}

            - name: Create artifacts directory
              run: mkdir artifacts

            - name: Build independent APK
              run: |
                  flutter build apk --build-name="${RELEASE_VERSION}" --build-number="${BUILD_NUMBER}" --dart-define=cronetHttpNoPlay=true --release --flavor independent
                  mv build/app/outputs/flutter-apk/app-independent-release.apk "artifacts/${ARTIFACT_STEM}.apk"
              env:
                  SIGNING_KEY_PATH: ${{ runner.temp }}/ente_locker_key.jks
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_LOCKER }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_LOCKER }}
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_LOCKER }}

            - name: Build PlayStore AAB
              run: flutter build appbundle --build-name="${RELEASE_VERSION}" --build-number="${BUILD_NUMBER}" --dart-define=cronetHttpNoPlay=true --release --flavor playstore
              env:
                  SIGNING_KEY_PATH: ${{ runner.temp }}/ente_locker_key.jks
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_LOCKER }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_LOCKER }}
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_LOCKER }}

            - name: Generate checksums
              run: cd artifacts && sha256sum ente-locker-*.apk > SHA256SUMS-android

            - name: Upload checksum snippet
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: locker-SHA256SUMS-android
                  path: mobile/apps/locker/artifacts/SHA256SUMS-android

            - name: Mint nightly token
              id: nightly_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: nightly
                  permission-contents: write

            - name: Upload Android artifact to nightly release
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  repo: nightly
                  token: ${{ steps.nightly_token.outputs.token }}
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  artifacts: "mobile/apps/locker/artifacts/ente-locker-*.apk"
                  prerelease: true
                  makeLatest: false
                  allowUpdates: true
                  updateOnlyUnreleased: true

            - name: Upload Android artifact to RC draft
              if: startsWith(github.ref_name, 'release/')
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  commit: ${{ env.COMMIT_SHA }}
                  artifacts: "mobile/apps/locker/artifacts/ente-locker-*.apk"
                  draft: true
                  allowUpdates: true
                  updateOnlyUnreleased: true

            - name: Upload AAB to PlayStore
              uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.locker
                  releaseFiles: mobile/apps/locker/build/app/outputs/bundle/playstoreRelease/app-playstore-release.aab
                  tracks: internal
                  whatsNewDirectory: mobile/apps/locker/whatsnew
                  mappingFile: mobile/apps/locker/build/app/outputs/mapping/playstoreRelease/mapping.txt

    build-ios:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: macos-26
        environment:
            name: production
        env:
            BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
            RELEASE_VERSION: ${{ needs.build-metadata.outputs.release_version }}

        defaults:
            run:
                working-directory: mobile/apps/locker

        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Install Flutter ${{ env.FLUTTER_VERSION }}
              uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION }}
                  cache: true

            - name: Generate strings localizations
              run: flutter gen-l10n
              working-directory: mobile/packages/strings

            - name: Set build version
              run: node ../../../.github/scripts/flutter-version.mjs locker set-build "${RELEASE_VERSION}" "${BUILD_NUMBER}"

            - name: Resolve dependencies with lockfile enforcement
              run: flutter pub get --enforce-lockfile

            - run: cargo codegen frb shared
              working-directory: rust

            - name: Install iOS pods
              run: pod install --deployment
              working-directory: mobile/apps/locker/ios

            - name: Import Apple Distribution certificate
              uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
              with:
                  p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
                  p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}

            - name: Archive and upload Locker to TestFlight
              env:
                  ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
                  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  key_path="${RUNNER_TEMP}/AuthKey_${ASC_KEY_ID}.p8"
                  printf '%s' "${ASC_API_KEY_BASE64}" | base64 --decode > "${key_path}"

                  xcodebuild archive \
                      -workspace ios/Runner.xcworkspace \
                      -scheme Runner \
                      -configuration Release \
                      -destination 'generic/platform=iOS' \
                      -archivePath build/ios/archive/Runner.xcarchive \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
                      CODE_SIGN_STYLE=Manual \
                      CODE_SIGN_IDENTITY="Apple Distribution" \
                      DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
                      APP_STORE_PROFILE_SPECIFIER="Locker App Store" \
                      SHARE_EXTENSION_APP_STORE_PROFILE_SPECIFIER="Locker Share Extension App Store" \
                      MARKETING_VERSION="${RELEASE_VERSION}" \
                      CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"

                  xcodebuild -exportArchive \
                      -archivePath build/ios/archive/Runner.xcarchive \
                      -exportPath build/ios/export \
                      -exportOptionsPlist scripts/ExportOptions-AppStore-CI.plist \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}"

    finish-build:
        needs: [build-metadata, build-android, build-ios]
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        environment:
            name: production

        steps:
            - name: Checkout built commit
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Download checksum snippets
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  pattern: locker-SHA256SUMS-*
                  path: checksums
                  merge-multiple: true

            - name: Combine checksums
              run: sort -k2 checksums/SHA256SUMS-* > SHA256SUMS

            - name: Point release tag at the successfully built commit
              env:
                  COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: |
                  git tag --force "${RELEASE_TAG}" "${COMMIT_SHA}"
                  git push --force origin "refs/tags/${RELEASE_TAG}"

            - name: Mint nightly token
              id: nightly_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: nightly
                  permission-contents: write

            - name: Upload checksum to nightly release
              env:
                  GH_TOKEN: ${{ steps.nightly_token.outputs.token }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: gh release upload "${RELEASE_TAG}" SHA256SUMS --clobber --repo ente-io/nightly

            - name: Upload checksum to RC draft
              if: startsWith(github.ref_name, 'release/')
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: gh release upload "${RELEASE_TAG}" SHA256SUMS --clobber

            - name: Notify Discord
              if: github.event_name != 'schedule' || needs.build-metadata.outputs.has_new_changes == 'true'
              continue-on-error: true
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  RELEASE_TITLE: ${{ needs.build-metadata.outputs.release_title }}
                  RELEASE_BODY_GROUPED: ${{ needs.build-metadata.outputs.release_body_grouped }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: node .github/scripts/release-notify.mjs locker "${RELEASE_TAG}"
