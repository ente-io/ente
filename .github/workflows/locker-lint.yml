name: "Lint (locker)"

on:
    # Run on every pull request (open or push to it) that changes locker app
    pull_request:
        paths:
            - ".github/workflows/locker-lint.yml"
            - "mobile/apps/locker/**"
            - "mobile/packages/contacts/**"
            - "mobile/packages/legacy/**"
            - "mobile/packages/rust/**"
            - "mobile/packages/sharing/**"
            - "mobile/scripts/check_source_arb_plurals.rb"
            - "rust/bindings/frb/ente-rust/**"
            - "rust/apps/codegen/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"

env:
    FLUTTER_VERSION: "3.38.10"

permissions:
    contents: read

jobs:
    locker-lint:
        runs-on: macos-26
        defaults:
            run:
                working-directory: mobile/apps/locker
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Verify frozen mobile pubspecs
              run: ruby mobile/scripts/check_frozen_pubspecs.rb mobile/apps/locker
              working-directory: ${{ github.workspace }}

            - name: Verify source ARB plurals
              run: ruby mobile/scripts/check_source_arb_plurals.rb
              working-directory: ${{ github.workspace }}

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - run: cargo codegen frb shared
              working-directory: rust

            - run: cargo clippy -p ente_rust --features flutter --all-targets --locked -- -D warnings
              working-directory: rust

            - name: Generate strings localizations
              run: flutter gen-l10n
              working-directory: mobile/packages/strings

            - run: flutter pub get --enforce-lockfile

            - name: Check iOS Podfile.lock is current
              run: pod install --deployment
              working-directory: mobile/apps/locker/ios

            - name: Generate locker localizations
              run: flutter gen-l10n

            - run: dart format --output=none --set-exit-if-changed .

            - run: flutter analyze --no-fatal-infos

            - run: flutter test
