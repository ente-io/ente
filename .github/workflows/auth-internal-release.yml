name: "Internal release (auth mobile)"

on:
    workflow_dispatch: # Allow manually running the action

env:
    FLUTTER_VERSION: "3.24.3"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: mobile/apps/auth

        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup JDK 17
              uses: actions/setup-java@v1
              with:
                  java-version: 17

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - name: Setup keys
              uses: timheuer/base64-to-file@v1
              with:
                  fileName: "keystore/ente_auth_key.jks"
                  encodedString: ${{ secrets.SIGNING_KEY }}

            - name: Build PlayStore AAB
              run: |
                  flutter build appbundle --dart-define=cronetHttpNoPlay=true --release --flavor playstore
              env:
                  SIGNING_KEY_PATH: "/home/runner/work/_temp/keystore/ente_auth_key.jks"
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

            - name: Upload AAB to PlayStore
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.auth
                  releaseFiles: mobile/apps/auth/build/app/outputs/bundle/playstoreRelease/app-playstore-release.aab
                  track: internal

            - name: Notify Discord
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  nodetail: true
                  title: "🏆 Internal release available for Auth"
                  description: "[Download](https://play.google.com/store/apps/details?id=io.ente.auth)"
                  color: 0x800080

    build-ios:
        runs-on: macos-13

        defaults:
            run:
                working-directory: mobile/apps/auth

        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Flutter ${{ env.FLUTTER_VERSION  }}
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION  }}
                  cache: true

            - name: Install fastlane
              run: gem install fastlane

            - name: Create ExportOptions.plist
              run: |
                cat <<EOF > ios/ExportOptions.plist
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                    <key>method</key>
                    <string>app-store</string>
                    <key>teamID</key>
                    <string>${{ secrets.IOS_TEAM_ID }}</string>
                </dict>
                </plist>
                EOF

            - name: Setup App Store Connect API Key
              run: |
                echo '${{ secrets.IOS_API_KEY }}' > api_key.json
                chmod 600 api_key.json

            - name: Build iOS IPA
              run: |
                flutter build ipa \
                  --release \
                  --export-options-plist=ios/ExportOptions.plist \
                  --dart-define=cronetHttpNoPlay=true
              env:
                SIGNING_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

            - name: Create artifacts directory
              run: mkdir artifacts

            - name: Copy IPA to artifacts
              run: cp build/ios/ipa/*.ipa artifacts/ente-${{ github.ref_name }}.ipa

            - name: Generate checksums
              run: shasum -a 256 artifacts/ente-${{ github.ref_name }}.ipa > artifacts/sha256sum-ios

            - name: Upload to TestFlight
              run: |
                fastlane pilot upload \
                  --api_key_path api_key.json \
                  --ipa "artifacts/ente-${{ github.ref_name }}.ipa" \
                  --skip_waiting_for_build_processing \
                  --apple_id ${{ secrets.IOS_APPLE_ID }} \
                  --app_identifier "io.ente.auth"
              env:
                APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.IOS_API_KEY_ID }}
                APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_ISSUER_ID }}
                FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.IOS_APP_SPECIFIC_PASSWORD }}

            - name: Submit app to App Store
              if: startsWith(github.ref, 'refs/tags/auth-v') && !contains(github.ref, 'nightly') && !contains(github.ref, 'beta')
              run: |
                fastlane deliver \
                  --api_key_path api_key.json \
                  --ipa "artifacts/ente-${{ github.ref_name }}.ipa" \
                  --skip_metadata \
                  --skip_screenshots \
                  --submit_for_review \
                  --app_identifier "io.ente.auth"
              env:
                APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.IOS_API_KEY_ID }}
                APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_ISSUER_ID }}
                FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.IOS_APP_SPECIFIC_PASSWORD }}

            - name: Clean sensitive files
              run: |
                rm -f api_key.json

            - name: Create a draft GitHub release
              uses: ncipollo/release-action@v1
              with:
                  artifacts: "mobile/apps/auth/artifacts/*"
                  draft: true
                  allowUpdates: true
                  updateOnlyUnreleased: true
