name: "Verify Podfile.lock (Mobile)"

# Verify each app's Podfile.lock is in sync with its Flutter plugins.

on:
    pull_request:
        paths:
            - ".github/workflows/mobile-podfile-lock.yml"
            - "mobile/**/pubspec.yaml"
            - "mobile/**/pubspec.lock"
            - "mobile/**/Podfile"
            - "mobile/**/Podfile.lock"
            - "mobile/**/*.podspec"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pod-check:
        runs-on: macos-26
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Install Flutter
              uses: ./.github/actions/setup-flutter

            - run: flutter pub get --enforce-lockfile
              working-directory: mobile

            - name: Verify Podfile.lock is current
              run: |
                  for app in photos auth locker; do
                      echo "Checking $app"
                      ( cd "mobile/apps/$app/ios" && pod install --deployment )
                  done
