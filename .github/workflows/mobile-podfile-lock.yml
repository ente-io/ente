name: "Verify Podfile.lock (Mobile)"

# Verify each app's Podfile.lock is in sync with its Flutter plugins.

on:
    pull_request:
        paths:
            - ".github/workflows/mobile-podfile-lock.yml"
            - "mobile/**/pubspec.yaml"
            - "mobile/**/pubspec.lock"
            - "mobile/**/pubspec_overrides.yaml"
            - "mobile/**/Podfile"
            - "mobile/**/Podfile.lock"
            - "mobile/**/*.podspec"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pod-check:
        runs-on: macos-26
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Install Flutter
              uses: ./.github/actions/setup-flutter

            - name: Verify Podfile.lock is current
              run: |
                  for app in photos auth locker; do
                      echo "Checking $app"
                      (
                          cd "mobile/apps/$app"
                          flutter pub get --enforce-lockfile
                          cd ios && pod install --deployment
                      )
                  done
