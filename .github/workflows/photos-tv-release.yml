name: "Release (photos-tv)"

on:
    push:
        tags:
            - "photos-tv-v*"
    workflow_dispatch:

env:
    NDK_VERSION: "27.0.12077973"

permissions:
    contents: write

jobs:
    build-android:
        runs-on: ubuntu-24.04
        env:
            HAS_ANDROID_SIGNING: ${{ secrets.SIGNING_KEY_TV != '' && secrets.SIGNING_STORE_PASSWORD_TV != '' && secrets.SIGNING_KEY_ALIAS_TV != '' && secrets.SIGNING_KEY_PASSWORD_TV != '' }}
            HAS_PLAYSTORE_SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT_JSON_TV != '' }}
            SHOULD_UPLOAD_PLAYSTORE: ${{ github.event_name != 'workflow_dispatch' && secrets.SERVICE_ACCOUNT_JSON_TV != '' }}
            HAS_DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK != '' }}

        defaults:
            run:
                working-directory: mobile/native/android/apps/tv

        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Set release tag
              shell: bash
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                      echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  else
                      echo "RELEASE_TAG=photos-tv-nightly-$(date -u +%Y%m%d)" >> $GITHUB_ENV
                  fi
                  echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install NDK
              run: |
                  echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

            - name: Install cargo-ndk
              run: cargo install cargo-ndk

            - name: Build Rust libraries
              run: |
                  ./gradlew buildEnteCore
              env:
                  ANDROID_HOME: ${{ env.ANDROID_HOME }}
                  NDK_VERSION: ${{ env.NDK_VERSION }}

            - name: Print Android release capabilities
              run: |
                  echo "HAS_ANDROID_SIGNING=${HAS_ANDROID_SIGNING}"
                  echo "HAS_PLAYSTORE_SERVICE_ACCOUNT=${HAS_PLAYSTORE_SERVICE_ACCOUNT}"
                  echo "SHOULD_UPLOAD_PLAYSTORE=${SHOULD_UPLOAD_PLAYSTORE}"
                  echo "HAS_DISCORD_WEBHOOK=${HAS_DISCORD_WEBHOOK}"

            - name: Setup signing keys
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  KEYSTORE_PATH=$(pwd)/tv-release.keystore
                  echo "${{ secrets.SIGNING_KEY_TV }}" | base64 -d > "$KEYSTORE_PATH"
                  cat > key.properties << EOF_KEY_PROPERTIES
                  storeFile=$KEYSTORE_PATH
                  storePassword=${{ secrets.SIGNING_STORE_PASSWORD_TV }}
                  keyAlias=${{ secrets.SIGNING_KEY_ALIAS_TV }}
                  keyPassword=${{ secrets.SIGNING_KEY_PASSWORD_TV }}
                  EOF_KEY_PROPERTIES

            - name: Build signed Android artifacts
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  if [ "${SHOULD_UPLOAD_PLAYSTORE}" = "true" ]; then
                      ./gradlew :app:assembleRelease :app:bundleRelease
                  else
                      ./gradlew :app:assembleRelease
                  fi

            - name: Prepare Android APK for GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  mkdir -p artifacts
                  cp app/build/outputs/apk/release/app-release.apk artifacts/${{ env.RELEASE_TAG }}.apk

            - name: Upload Android APK to draft GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  artifacts: mobile/native/android/apps/tv/artifacts/${{ env.RELEASE_TAG }}.apk
                  allowUpdates: true
                  draft: true
                  updateOnlyUnreleased: true

            - name: Upload AAB to PlayStore
              if: env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true'
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON_TV }}
                  packageName: io.ente.photos.tv
                  releaseFiles: mobile/native/android/apps/tv/app/build/outputs/bundle/release/app-release.aab
                  track: internal

            - name: Notify Discord
              if: success() && env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true' && env.HAS_DISCORD_WEBHOOK == 'true'
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  nodetail: true
                  title: "🤖 Internal release available for Photos TV"
                  description: |
                      ${{ env.RELEASE_TAG }} ([${{ env.SHORT_SHA }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})) · [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }})
                  color: 0x08C225
