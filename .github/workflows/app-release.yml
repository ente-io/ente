name: "Release (App)"

# See .github/docs/app-release.md

on:
    workflow_dispatch:
        inputs:
            app:
                description: "App to release"
                required: true
                type: choice
                options:
                    - photos
                    - auth
                    - locker
                    - ensu
                    - photos-desktop
            action:
                description: "Release action"
                required: true
                type: choice
                options:
                    - start
                    - promote
            version:
                description: "Release version, e.g. 0.1.16"
                required: true
                type: string

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: ${{ inputs.app }}-release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        environment:
            name: release-branch-push
        env:
            APP: ${{ inputs.app }}
            VERSION: ${{ inputs.version }}

        steps:
            - name: Checkout main
              if: inputs.action == 'start'
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: main

            - name: Checkout release branch
              if: inputs.action == 'promote'
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: release/${{ inputs.app }}-v${{ inputs.version }}

            - name: Mint App token
              id: app_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: ente,nightly,photos-desktop
                  permission-contents: write
                  permission-pull-requests: write

            - name: Start release
              if: inputs.action == 'start'
              env:
                  GH_TOKEN: ${{ steps.app_token.outputs.token }}
                  APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
              run: |
                  set -euo pipefail

                  app_version() {
                      if [ "${APP}" = "ensu" ]; then
                          node .github/scripts/ensu-version.mjs "$@"
                      elif [ "${APP}" = "photos-desktop" ]; then
                          node .github/scripts/photos-desktop-version.mjs "$@"
                      else
                          node .github/scripts/flutter-version.mjs "${APP}" "$@"
                      fi
                  }

                  git_push_release_branch() {
                      git -c http.https://github.com/.extraheader= push \
                          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$@"
                  }

                  bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
                  git config user.name "${APP_SLUG}[bot]"
                  git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"

                  release_branch="release/${APP}-v${VERSION}"
                  beta_tag="${APP}-v${VERSION}-beta"
                  IFS=. read -r major minor patch <<< "${VERSION}"
                  expected_main_version="${VERSION}"
                  next_version="${major}.${minor}.$((patch + 1))"
                  if [ "${APP}" = "ensu" ] || [ "${APP}" = "photos-desktop" ]; then
                      expected_main_version="${VERSION}-beta"
                      next_version="${next_version}-beta"
                  fi
                  next_branch="${APP}-v${next_version}"

                  main_version="$(app_version get)"
                  if [ "${main_version}" != "${expected_main_version}" ]; then
                      echo "::error::main is ${main_version}, expected ${expected_main_version}"
                      exit 1
                  fi

                  git switch -c "${release_branch}"
                  if [ "${APP}" = "ensu" ] || [ "${APP}" = "photos-desktop" ]; then
                      app_version set "${VERSION}"
                      git commit -am "${APP^} v${VERSION}"
                  fi
                  git_push_release_branch "${release_branch}"

                  gh release delete "${beta_tag}" --yes --cleanup-tag --repo ente-io/nightly || true
                  git push origin ":refs/tags/${beta_tag}" || true

                  git switch -c "${next_branch}" main
                  app_version set "${next_version}"
                  CHANGES_DIR="mobile/apps/${APP}/changes"
                  if [ "${APP}" = "ensu" ]; then
                      CHANGES_DIR="rust/apps/ensu/changes"
                  elif [ "${APP}" = "photos-desktop" ]; then
                      CHANGES_DIR="desktop/changes"
                  fi
                  find "${CHANGES_DIR}" -maxdepth 1 -type f -name '*.md' ! -name README.md -delete
                  git commit -am "Start ${APP^} ${next_version}"
                  git push -u origin "${next_branch}"

                  gh pr create --base main --head "${next_branch}" --title "[${APP}] Start ${APP^} ${next_version}" --body ""

            - name: Promote release
              if: inputs.action == 'promote'
              env:
                  GH_TOKEN: ${{ steps.app_token.outputs.token }}
              run: |
                  set -euo pipefail

                  app_version() {
                      if [ "${APP}" = "ensu" ]; then
                          node .github/scripts/ensu-version.mjs "$@"
                      elif [ "${APP}" = "photos-desktop" ]; then
                          node .github/scripts/photos-desktop-version.mjs "$@"
                      else
                          node .github/scripts/flutter-version.mjs "${APP}" "$@"
                      fi
                  }

                  git_push_release_branch() {
                      git -c http.https://github.com/.extraheader= push \
                          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$@"
                  }

                  release_branch="release/${APP}-v${VERSION}"

                  if [ "${APP}" = "photos-desktop" ]; then
                      if ! draft="$(gh release view "v${VERSION}" --repo ente-io/photos-desktop --json isDraft --jq .isDraft 2>/dev/null)" || [ "${draft}" != "true" ]; then
                          echo "::error::v${VERSION} draft release does not exist in photos-desktop"
                          exit 1
                      fi
                      branch_version="$(app_version get)"
                      if [ "${branch_version}" != "${VERSION}" ]; then
                          echo "::error::${release_branch} is ${branch_version}, expected ${VERSION}"
                          exit 1
                      fi
                      release_sha="$(git rev-parse HEAD)"
                      rc_sha="$(git ls-remote origin "refs/tags/photos-desktop-v${VERSION}-rc" | cut -f1)"
                      if [ "${rc_sha}" != "${release_sha}" ]; then
                          echo "::error::photos-desktop-v${VERSION}-rc does not point at ${release_branch}"
                          exit 1
                      fi

                      git tag "photos-desktop-v${VERSION}" "${release_sha}"
                      git push origin "refs/tags/photos-desktop-v${VERSION}"

                      gh release edit "v${VERSION}" --repo ente-io/photos-desktop --draft=false --prerelease=false --latest
                      gh release delete "photos-desktop-v${VERSION}-rc" --yes --cleanup-tag --repo ente-io/nightly || true
                      git_push_release_branch ":refs/heads/${release_branch}"
                      git push origin ":refs/tags/photos-desktop-v${VERSION}-rc" || true
                      exit 0
                  fi

                  rc_tag="${APP}-v${VERSION}-rc"
                  final_tag="${APP}-v${VERSION}"

                  if ! rc_is_draft="$(gh release view "${rc_tag}" --json isDraft --jq .isDraft 2>/dev/null)" || [ "${rc_is_draft}" != "true" ]; then
                      echo "::error::${rc_tag} draft release does not exist"
                      exit 1
                  fi

                  branch_version="$(app_version get)"
                  if [ "${branch_version}" != "${VERSION}" ]; then
                      echo "::error::${release_branch} is ${branch_version}, expected ${VERSION}"
                      exit 1
                  fi

                  release_sha="$(git rev-parse HEAD)"
                  rc_sha="$(git ls-remote origin "refs/tags/${rc_tag}" | cut -f1)"

                  if [ "${rc_sha}" != "${release_sha}" ]; then
                      echo "::error::${rc_tag} does not point at ${release_branch}"
                      exit 1
                  fi

                  git tag "${final_tag}" "${release_sha}"
                  git push origin "refs/tags/${final_tag}"
                  gh release edit "${rc_tag}" --tag "${final_tag}" --title "${final_tag}" --target "${release_sha}" --draft=false --prerelease=false --verify-tag

                  git push origin ":refs/tags/${rc_tag}" || true
                  gh release delete "${rc_tag}" --yes --cleanup-tag --repo ente-io/nightly || true
                  git_push_release_branch ":refs/heads/${release_branch}"

    sync-docs:
        needs: release
        if: inputs.action == 'promote'
        runs-on: ubuntu-latest
        environment:
            name: release-branch-push

        steps:
            - name: Checkout main
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  ref: main

            - name: Mint App token
              id: app_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: ente,photos-desktop
                  permission-contents: write
                  permission-pull-requests: write

            - name: Open changelog PR
              env:
                  APP: ${{ inputs.app }}
                  VERSION: ${{ inputs.version }}
                  GH_TOKEN: ${{ steps.app_token.outputs.token }}
                  APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
              run: |
                  set -euo pipefail

                  git_push_branch() {
                      git -c http.https://github.com/.extraheader= push \
                          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$@"
                  }

                  bot_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
                  git config user.name "${APP_SLUG}[bot]"
                  git config user.email "${bot_id}+${APP_SLUG}[bot]@users.noreply.github.com"

                  if [ "${APP}" = "photos-desktop" ]; then
                      RELEASE_BODY="$(gh release view "v${VERSION}" --repo ente-io/photos-desktop --json body --jq .body)"
                  else
                      RELEASE_BODY="$(gh release view "${APP}-v${VERSION}" --json body --jq .body)"
                  fi
                  export RELEASE_BODY

                  node .github/scripts/sync-help-changelog.mjs "${APP}" "${VERSION}"
                  if git diff --quiet; then
                      echo "Help changelog already up to date"
                      exit 0
                  fi

                  branch="docs/${APP}-changelog-v${VERSION}"
                  git switch -c "${branch}"
                  git commit -am "Update ${APP} help changelog for v${VERSION}"
                  git_push_branch "${branch}"
                  gh pr create --base main --head "${branch}" \
                      --title "[docs] Update ${APP} help changelog for v${VERSION}" --body ""
