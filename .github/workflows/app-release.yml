name: "Release app"

# See .github/docs/app-release.md

on:
    workflow_dispatch:
        inputs:
            app:
                description: "App to release"
                required: true
                type: choice
                options:
                    - auth
                    - ensu
            action:
                description: "Release action"
                required: true
                type: choice
                options:
                    - start
                    - promote
            version:
                description: "Release version, e.g. 0.1.16"
                required: true
                type: string

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: ${{ inputs.app }}-release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        environment:
            name: release-branch-push
        env:
            APP: ${{ inputs.app }}
            GH_TOKEN: ${{ github.token }}
            VERSION: ${{ inputs.version }}

        steps:
            - name: Checkout main
              if: inputs.action == 'start'
              uses: actions/checkout@v6
              with:
                  ref: main

            - name: Checkout release branch
              if: inputs.action == 'promote'
              uses: actions/checkout@v6
              with:
                  ref: release/${{ inputs.app }}-v${{ inputs.version }}

            - name: Configure Git
              if: inputs.action == 'start'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Start release
              if: inputs.action == 'start'
              env:
                  RELEASE_BRANCH_PUSH_TOKEN: ${{ secrets.RELEASE_BRANCH_PUSH_TOKEN }}
              run: |
                  set -euo pipefail

                  git_push_release_branch() {
                      git -c http.https://github.com/.extraheader= push \
                          "https://x-access-token:${RELEASE_BRANCH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$@"
                  }

                  release_branch="release/${APP}-v${VERSION}"
                  beta_tag="${APP}-v${VERSION}-beta"
                  IFS=. read -r major minor patch <<< "${VERSION}"
                  expected_main_version="${VERSION}"
                  next_version="${major}.${minor}.$((patch + 1))"
                  if [ "${APP}" = "ensu" ]; then
                      expected_main_version="${VERSION}-beta"
                      next_version="${next_version}-beta"
                  fi
                  next_branch="${APP}-v${next_version}"

                  main_version="$(node ".github/scripts/${APP}-version.mjs" get)"
                  if [ "${main_version}" != "${expected_main_version}" ]; then
                      echo "::error::main is ${main_version}, expected ${expected_main_version}"
                      exit 1
                  fi

                  git switch -c "${release_branch}"
                  if [ "${APP}" = "ensu" ]; then
                      node ".github/scripts/ensu-version.mjs" set "${VERSION}"
                      git commit -am "${APP^} v${VERSION}"
                  fi
                  git_push_release_branch "${release_branch}"

                  gh release delete "${beta_tag}" --yes || true
                  git push origin ":refs/tags/${beta_tag}" || true

                  git switch -c "${next_branch}" main
                  node ".github/scripts/${APP}-version.mjs" set "${next_version}"
                  CHANGES_DIR="mobile/apps/${APP}/changes"
                  if [ "${APP}" = "ensu" ]; then
                      CHANGES_DIR="rust/apps/ensu/changes"
                  fi
                  find "${CHANGES_DIR}" -maxdepth 1 -type f -name '*.md' ! -name README.md -delete
                  git commit -am "Start ${APP^} ${next_version}"
                  git push -u origin "${next_branch}"

                  gh pr create --base main --head "${next_branch}" --title "[${APP}] Start ${APP^} ${next_version}" --body ""

            - name: Promote release
              if: inputs.action == 'promote'
              env:
                  RELEASE_BRANCH_PUSH_TOKEN: ${{ secrets.RELEASE_BRANCH_PUSH_TOKEN }}
              run: |
                  set -euo pipefail

                  git_push_release_branch() {
                      git -c http.https://github.com/.extraheader= push \
                          "https://x-access-token:${RELEASE_BRANCH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$@"
                  }

                  release_branch="release/${APP}-v${VERSION}"
                  rc_tag="${APP}-v${VERSION}-rc"
                  final_tag="${APP}-v${VERSION}"

                  if ! rc_is_draft="$(gh release view "${rc_tag}" --json isDraft --jq .isDraft 2>/dev/null)" || [ "${rc_is_draft}" != "true" ]; then
                      echo "::error::${rc_tag} draft release does not exist"
                      exit 1
                  fi

                  branch_version="$(node ".github/scripts/${APP}-version.mjs" get)"
                  if [ "${branch_version}" != "${VERSION}" ]; then
                      echo "::error::${release_branch} is ${branch_version}, expected ${VERSION}"
                      exit 1
                  fi

                  release_sha="$(git rev-parse HEAD)"
                  rc_sha="$(git ls-remote origin "refs/tags/${rc_tag}" | cut -f1)"

                  if [ "${rc_sha}" != "${release_sha}" ]; then
                      echo "::error::${rc_tag} does not point at ${release_branch}"
                      exit 1
                  fi

                  git tag "${final_tag}" "${release_sha}"
                  git push origin "refs/tags/${final_tag}"
                  gh release edit "${rc_tag}" --tag "${final_tag}" --title "${final_tag}" --target "${release_sha}" --draft --verify-tag

                  git push origin ":refs/tags/${rc_tag}" || true
                  git_push_release_branch ":refs/heads/${release_branch}"
