name: "Release (copycat-db)"

on:
    workflow_dispatch: # Run manually

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v6
              name: Check out code

            - name: Log in to Docker registry
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
              run: printf '%s' "${DOCKER_PASSWORD}" | docker login rg.fr-par.scw.cloud --username "${DOCKER_USERNAME}" --password-stdin

            - name: Build and push image
              run: |
                  docker buildx build --push \
                      --file infra/copycat-db/Dockerfile \
                      --build-arg GIT_COMMIT="${GITHUB_SHA}" \
                      --tag rg.fr-par.scw.cloud/ente/copycat-db:${GITHUB_SHA} \
                      --tag rg.fr-par.scw.cloud/ente/copycat-db:latest \
                      infra/copycat-db
