name: "Release (ensu)"

# See .github/docs/ensu-release.md

on:
    workflow_dispatch:
        inputs:
            action:
                description: "Release action"
                required: true
                type: choice
                options:
                    - start
                    - finalize
            version:
                description: "Release version, e.g. 0.1.16"
                required: true
                type: string

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: ensu-release
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ github.token }}
            VERSION: ${{ inputs.version }}

        steps:
            - name: Checkout main
              if: inputs.action == 'start'
              uses: actions/checkout@v6
              with:
                  ref: main

            - name: Checkout release branch
              if: inputs.action == 'finalize'
              uses: actions/checkout@v6
              with:
                  ref: release/ensu-v${{ inputs.version }}

            - name: Configure Git
              if: inputs.action == 'start'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Start release
              if: inputs.action == 'start'
              run: |
                  set -euo pipefail

                  release_branch="release/ensu-v${VERSION}"
                  beta_tag="ensu-v${VERSION}-beta"
                  IFS=. read -r major minor patch <<< "${VERSION}"
                  next_version="${major}.${minor}.$((patch + 1))-beta"
                  next_branch="ensu-v${next_version}"

                  main_version="$(node .github/scripts/ensu-version.mjs get)"
                  if [ "${main_version}" != "${VERSION}-beta" ]; then
                      echo "::error::main is ${main_version}, expected ${VERSION}-beta"
                      exit 1
                  fi

                  git switch -c "${release_branch}"
                  node .github/scripts/ensu-version.mjs set "${VERSION}"
                  git commit -am "Ensu v${VERSION}"
                  git push -u origin "${release_branch}"

                  gh release delete "${beta_tag}" --yes || true
                  git push origin ":refs/tags/${beta_tag}" || true

                  git switch -c "${next_branch}" main
                  node .github/scripts/ensu-version.mjs set "${next_version}"
                  find rust/apps/ensu/changes -maxdepth 1 -type f -name '*.md' ! -name README.md -delete
                  git commit -am "Start Ensu ${next_version}"
                  git push -u origin "${next_branch}"

                  gh pr create --base main --head "${next_branch}" --title "[ensu] Start Ensu ${next_version}" --body ""

            - name: Finalize release
              if: inputs.action == 'finalize'
              run: |
                  set -euo pipefail

                  release_branch="release/ensu-v${VERSION}"
                  rc_tag="ensu-v${VERSION}-rc"
                  final_tag="ensu-v${VERSION}"

                  branch_version="$(node .github/scripts/ensu-version.mjs get)"
                  if [ "${branch_version}" != "${VERSION}" ]; then
                      echo "::error::${release_branch} is ${branch_version}, expected ${VERSION}"
                      exit 1
                  fi

                  release_sha="$(git rev-parse HEAD)"
                  rc_sha="$(git ls-remote origin "refs/tags/${rc_tag}" | cut -f1)"

                  if [ "${rc_sha}" != "${release_sha}" ]; then
                      echo "::error::${rc_tag} does not point at ${release_branch}"
                      exit 1
                  fi

                  git tag "${final_tag}" "${release_sha}"
                  git push origin "refs/tags/${final_tag}"
                  gh release edit "${rc_tag}" --tag "${final_tag}" --title "${final_tag}" --target "${release_sha}" --draft --verify-tag

                  git push origin ":refs/tags/${rc_tag}" || true
                  git push origin ":refs/heads/${release_branch}"
