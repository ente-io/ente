name: "Release (ensu)"

on:
    push:
        # Run when a tag matching the pattern "ensu-v*" is pushed
        tags:
            - "ensu-v*"
    # Also allow manually running the workflow
    workflow_dispatch:

env:
    NDK_VERSION: "27.0.12077973"

permissions:
    contents: write

jobs:
    release-desktop:
        environment: "auth-win-build"
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - os: ubuntu-24.04
                      rust-target: x86_64-unknown-linux-gnu
                    - os: macos-latest
                      rust-target: x86_64-apple-darwin
                    - os: macos-latest
                      rust-target: aarch64-apple-darwin
                    - os: windows-latest
                      rust-target: x86_64-pc-windows-msvc

        runs-on: ${{ matrix.platform.os }}
        env:
            HAS_WINDOWS_SIGNING: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_ENDPOINT != '' && secrets.AZURE_CODE_SIGNING_NAME != '' && secrets.AZURE_CERT_PROFILE_NAME != '' }}
            HAS_UPDATER_CONFIG: ${{ vars.ENSU_TAURI_UPDATER_PUBKEY != '' }}

        steps:
            - name: Set release tag
              shell: bash
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                      echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  else
                      echo "RELEASE_TAG=ensu-nightly-$(date -u +%Y%m%d)" >> $GITHUB_ENV
                  fi
                  echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "yarn"
                  cache-dependency-path: "web/yarn.lock"

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform.rust-target }}

            - name: Set macOS deployment target
              if: matrix.platform.os == 'macos-latest'
              run: |
                  echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
                  echo "CMAKE_OSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform.os == 'ubuntu-24.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Rust cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/apps/ensu/src-tauri/target
                  key: ${{ runner.os }}-${{ matrix.platform.rust-target }}-cargo-ensu-release-${{ hashFiles('rust/apps/ensu/src-tauri/Cargo.lock') }}

            - name: Install web dependencies
              working-directory: web
              run: yarn install --frozen-lockfile

            - name: Build WASM
              working-directory: web
              run: yarn build:wasm

            - name: Install Tauri dependencies
              working-directory: rust/apps/ensu
              run: yarn install

            - name: Fetch Rust dependencies
              shell: bash
              working-directory: rust/apps/ensu/src-tauri
              run: cargo fetch

            - name: Patch llama.cpp mtmd sources
              shell: bash
              run: rust/ensu/inference/tool/patch_llama_mtmd.sh

            - name: Install trusted-signing-cli (Windows only)
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              run: cargo install --locked trusted-signing-cli

            - name: Enable Windows signCommand for Tauri (Azure Trusted Signing)
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              env:
                  AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
                  AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const path = 'rust/apps/ensu/src-tauri/tauri.conf.json';
                  const config = JSON.parse(fs.readFileSync(path, 'utf8'));
                  config.bundle = config.bundle || {};
                  config.bundle.windows = config.bundle.windows || {};
                  config.bundle.windows.signCommand = `trusted-signing-cli -e ${process.env.AZURE_ENDPOINT} -a ${process.env.AZURE_CODE_SIGNING_NAME} -c ${process.env.AZURE_CERT_PROFILE_NAME} -d Ensu "%1"`;
                  fs.writeFileSync(path, JSON.stringify(config, null, 2));
                  NODE

            - name: Enable updater artifacts for release builds
              if: env.HAS_UPDATER_CONFIG == 'true'
              shell: bash
              env:
                  ENSU_TAURI_UPDATER_PUBKEY: ${{ vars.ENSU_TAURI_UPDATER_PUBKEY }}
                  ENSU_TAURI_UPDATER_ENDPOINT: ${{ vars.ENSU_TAURI_UPDATER_ENDPOINT }}
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const path = 'rust/apps/ensu/src-tauri/tauri.conf.json';
                  const config = JSON.parse(fs.readFileSync(path, 'utf8'));
                  const endpoint = (process.env.ENSU_TAURI_UPDATER_ENDPOINT || 'https://ente.io/release-info/ensu-desktop.json').trim();

                  if (!process.env.ENSU_TAURI_UPDATER_PUBKEY) {
                    throw new Error('ENSU_TAURI_UPDATER_PUBKEY is empty');
                  }

                  config.bundle = config.bundle || {};
                  config.bundle.createUpdaterArtifacts = true;
                  config.plugins = config.plugins || {};
                  config.plugins.updater = {
                    pubkey: process.env.ENSU_TAURI_UPDATER_PUBKEY,
                    endpoints: [endpoint],
                  };

                  fs.writeFileSync(path, JSON.stringify(config, null, 2));
                  NODE

            - name: Build and release Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY != '' && secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' && secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}
                  MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform.os == 'macos-latest' && '10.15' || '' }}
                  CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.platform.os == 'macos-latest' && '10.15' || '' }}
                  APPLE_CERTIFICATE: ${{ secrets.MAC_OS_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "Developer ID Application"
                  KEYCHAIN_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
              with:
                  projectPath: rust/apps/ensu
                  tagName: ${{ env.RELEASE_TAG }}
                  releaseName: "Ensu Desktop ${{ env.RELEASE_TAG }}"
                  releaseBody: "Ensu release assets: Linux/macOS/Windows desktop + Android APK."
                  releaseDraft: true
                  prerelease: false
                  uploadWorkflowArtifacts: false
                  uploadUpdaterJson: false
                  uploadUpdaterSignatures: true
                  args: ${{ matrix.platform.rust-target != 'x86_64-unknown-linux-gnu' && format('--target {0}', matrix.platform.rust-target) || '' }}


    finalize-updater-json:
        runs-on: ubuntu-24.04
        needs: release-desktop
        if: startsWith(github.ref, 'refs/tags/ensu-v') && vars.ENSU_TAURI_UPDATER_PUBKEY != ''

        steps:
            - name: Set release tag and updater version
              shell: bash
              run: |
                  echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  echo "ENSU_UPDATER_VERSION=${GITHUB_REF_NAME#ensu-v}" >> $GITHUB_ENV

            - name: Generate latest.json from release assets
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GH_REPO: ${{ github.repository }}
                  RELEASE_TAG: ${{ env.RELEASE_TAG }}
                  ENSU_UPDATER_VERSION: ${{ env.ENSU_UPDATER_VERSION }}
                  ENSU_UPDATER_URL_PREFIX: ${{ vars.ENSU_UPDATER_URL_PREFIX }}
              run: |
                  node <<'NODE'
                  const fs = require('node:fs');

                  (async () => {
                  const token = process.env.GH_TOKEN || process.env.GITHUB_TOKEN;
                  const repo = process.env.GH_REPO;
                  const tag = process.env.RELEASE_TAG;
                  const version = process.env.ENSU_UPDATER_VERSION;

                  if (!token) throw new Error('Missing GH_TOKEN/GITHUB_TOKEN');
                  if (!repo) throw new Error('Missing GH_REPO');
                  if (!tag) throw new Error('Missing RELEASE_TAG');
                  if (!version) throw new Error('Missing ENSU_UPDATER_VERSION');

                  const apiHeaders = {
                    Authorization: `token ${token}`,
                    Accept: 'application/vnd.github+json',
                  };

                  const releaseRes = await fetch(`https://api.github.com/repos/${repo}/releases/tags/${tag}`, {
                    headers: apiHeaders,
                  });
                  if (!releaseRes.ok) {
                    throw new Error(`Failed to fetch release: ${releaseRes.status} ${releaseRes.statusText}`);
                  }
                  const release = await releaseRes.json();
                  const assets = release.assets || [];
                  const assetByName = new Map(assets.map((asset) => [asset.name, asset]));
                  const bundleAssets = assets.filter((asset) => !asset.name.endsWith('.sig'));

                  const findAsset = (patterns) => {
                    for (const pattern of patterns) {
                      const match = bundleAssets.find((asset) => pattern.test(asset.name));
                      if (match) return match;
                    }
                    return undefined;
                  };

                  const fetchSignature = async (signatureAsset) => {
                    const signatureRes = await fetch(signatureAsset.url, {
                      headers: {
                        Authorization: `token ${token}`,
                        Accept: 'application/octet-stream',
                      },
                    });
                    if (!signatureRes.ok) {
                      throw new Error(`Failed to fetch ${signatureAsset.name}: ${signatureRes.status} ${signatureRes.statusText}`);
                    }
                    return (await signatureRes.text()).trim();
                  };

                  const urlPrefix = (process.env.ENSU_UPDATER_URL_PREFIX || `https://github.com/${repo}/releases/download/${tag}`).replace(/\/$/, '');
                  const platforms = {};

                  const addPlatform = async (key, asset) => {
                    if (!asset || platforms[key]) return;
                    const signatureAsset = assetByName.get(`${asset.name}.sig`);
                    if (!signatureAsset) return;
                    platforms[key] = {
                      url: `${urlPrefix}/${asset.name}`,
                      signature: await fetchSignature(signatureAsset),
                    };
                  };

                  const linuxX64 = findAsset([
                    /(?:amd64|x86_64)\.AppImage$/i,
                    /(?:amd64|x86_64)\.deb$/i,
                    /x86_64\.rpm$/i,
                  ]);
                  const linuxAarch64 = findAsset([
                    /(?:aarch64|arm64)\.AppImage$/i,
                    /(?:aarch64|arm64)\.deb$/i,
                    /aarch64\.rpm$/i,
                  ]);
                  const windowsX64 = findAsset([
                    /x64-setup(?:-machine)?\.exe$/i,
                    /x64.*\.exe$/i,
                    /x64.*\.msi$/i,
                  ]);
                  const darwinX64 = findAsset([
                    /(?:x64|x86_64)\.app\.tar\.gz$/i,
                    /universal\.app\.tar\.gz$/i,
                  ]);
                  const darwinAarch64 = findAsset([
                    /(?:aarch64|arm64)\.app\.tar\.gz$/i,
                    /universal\.app\.tar\.gz$/i,
                  ]);

                  await addPlatform('linux-x86_64', linuxX64);
                  await addPlatform('linux-aarch64', linuxAarch64);
                  await addPlatform('windows-x86_64', windowsX64);
                  await addPlatform('darwin-x86_64', darwinX64);
                  await addPlatform('darwin-aarch64', darwinAarch64);

                  if (Object.keys(platforms).length === 0) {
                    throw new Error('No updater platforms found from release assets');
                  }

                  const latest = {
                    version,
                    notes: '',
                    pub_date: new Date().toISOString(),
                    platforms,
                  };

                  fs.writeFileSync('/tmp/ensu-latest.json', JSON.stringify(latest, null, 2));
                  console.log(`Generated /tmp/ensu-latest.json with platforms: ${Object.keys(platforms).join(', ')}`);
                  })().catch((error) => {
                    console.error(error);
                    process.exit(1);
                  });
                  NODE

            - name: Upload latest.json to GitHub release
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "${RELEASE_TAG}" /tmp/ensu-latest.json#latest.json --clobber --repo "${{ github.repository }}"

    build-android:
        runs-on: ubuntu-24.04
        env:
            HAS_ANDROID_SIGNING: ${{ secrets.SIGNING_KEY_ENSU != '' && secrets.SIGNING_STORE_PASSWORD_ENSU != '' && secrets.SIGNING_KEY_ALIAS_ENSU != '' && secrets.SIGNING_KEY_PASSWORD_ENSU != '' }}
            HAS_PLAYSTORE_SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT_JSON != '' }}
            SHOULD_UPLOAD_PLAYSTORE: ${{ github.event_name != 'workflow_dispatch' && secrets.SERVICE_ACCOUNT_JSON != '' }}
            HAS_DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK != '' }}

        defaults:
            run:
                working-directory: mobile/native/android/apps/ensu

        steps:
            - name: Checkout code and submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Set release tag
              shell: bash
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                      echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  else
                      echo "RELEASE_TAG=ensu-nightly-$(date -u +%Y%m%d)" >> $GITHUB_ENV
                  fi
                  echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install NDK
              run: |
                  echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

            - name: Install cargo-ndk
              run: cargo install cargo-ndk

            - name: Build Rust libraries
              run: |
                  cd ../../packages/rust/tool
                  ./build_android.sh
              env:
                  ANDROID_HOME: ${{ env.ANDROID_HOME }}
                  NDK_VERSION: ${{ env.NDK_VERSION }}

            - name: Print Android release capabilities
              run: |
                  echo "HAS_ANDROID_SIGNING=${HAS_ANDROID_SIGNING}"
                  echo "HAS_PLAYSTORE_SERVICE_ACCOUNT=${HAS_PLAYSTORE_SERVICE_ACCOUNT}"
                  echo "SHOULD_UPLOAD_PLAYSTORE=${SHOULD_UPLOAD_PLAYSTORE}"
                  echo "HAS_DISCORD_WEBHOOK=${HAS_DISCORD_WEBHOOK}"

            - name: Setup signing keys
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  KEYSTORE_PATH=$(pwd)/ensu-release.keystore
                  echo "${{ secrets.SIGNING_KEY_ENSU }}" | base64 -d > "$KEYSTORE_PATH"
                  cat > key.properties << EOF
                  storeFile=$KEYSTORE_PATH
                  storePassword=${{ secrets.SIGNING_STORE_PASSWORD_ENSU }}
                  keyAlias=${{ secrets.SIGNING_KEY_ALIAS_ENSU }}
                  keyPassword=${{ secrets.SIGNING_KEY_PASSWORD_ENSU }}
                  EOF

            - name: Build signed Android artifacts
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  if [ "${SHOULD_UPLOAD_PLAYSTORE}" = "true" ]; then
                      ./gradlew :app-ui:assembleRelease :app-ui:bundleRelease
                  else
                      ./gradlew :app-ui:assembleRelease
                  fi

            - name: Prepare Android APK for GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  mkdir -p artifacts
                  cp app-ui/build/outputs/apk/release/app-ui-release.apk artifacts/${{ env.RELEASE_TAG }}.apk

            - name: Upload Android APK to draft GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  artifacts: mobile/native/android/apps/ensu/artifacts/${{ env.RELEASE_TAG }}.apk
                  allowUpdates: true
                  draft: true
                  updateOnlyUnreleased: true

            - name: Upload AAB to PlayStore
              if: env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true'
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.ensu
                  releaseFiles: mobile/native/android/apps/ensu/app-ui/build/outputs/bundle/release/app-ui-release.aab
                  track: internal

            - name: Notify Discord
              if: success() && env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true' && env.HAS_DISCORD_WEBHOOK == 'true'
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  nodetail: true
                  title: "🤖 Internal release available for Ensu"
                  description: |
                      ${{ env.RELEASE_TAG }} ([${{ env.SHORT_SHA }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})) · [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }})
                  color: 0xFDCE13
