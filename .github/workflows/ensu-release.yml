name: "Release (ensu)"

# See .github/docs/ensu-release.md

on:
    push:
        branches:
            - "release/ensu-v*"
    workflow_dispatch:
        inputs:
            release:
                description: "Create the release draft"
                required: false
                default: false
                type: boolean
    schedule:
        # Run every weekday at ~7:15 AM IST
        - cron: "45 1 * * 1-5"

env:
    NDK_VERSION: "27.3.13750724"

permissions:
    contents: write

concurrency:
    group: ensu-release
    cancel-in-progress: false

jobs:
    release-metadata:
        runs-on: ubuntu-22.04

        outputs:
            should_build: ${{ steps.prepare.outputs.should_build }}
            commit_sha: ${{ steps.prepare.outputs.commit_sha }}
            release_tag: ${{ steps.prepare.outputs.release_tag }}
            release_body: ${{ steps.prepare.outputs.release_body }}
            is_release: ${{ steps.prepare.outputs.is_release }}
            short_sha: ${{ steps.prepare.outputs.short_sha }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}

            - name: Prepare release
              id: prepare
              shell: bash
              env:
                  INPUT_RELEASE: ${{ inputs.release || false }}
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && git ls-remote --exit-code --heads origin 'release/ensu-v*' >/dev/null 2>&1; then
                      echo "Active Ensu release branch found; skipping scheduled nightly"
                      echo "should_build=false" >> "${GITHUB_OUTPUT}"
                      exit 0
                  fi

                  version="$(node .github/scripts/ensu-version.mjs get)"

                  if [[ "${INPUT_RELEASE}" == "true" ]]; then
                      expected_tag="ensu-v${version}"
                      if [[ "${GITHUB_REF_NAME}" != "release/${expected_tag}" ]]; then
                          echo "::error::Branch ${GITHUB_REF_NAME} does not match Ensu version ${version}"
                          exit 1
                      fi

                      if git fetch --force origin "refs/tags/${expected_tag}:refs/tags/${expected_tag}" 2>/dev/null; then
                          git checkout --detach "${expected_tag}"
                      else
                          git config user.name "github-actions[bot]"
                          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                          node .github/scripts/ensu-version.mjs set "${version}"
                          git commit -am "Mark Ensu ${version} release"
                          git tag "${expected_tag}"
                          git push origin "${expected_tag}"
                      fi

                      RELEASE_TAG="${expected_tag}"
                      RELEASE_BODY=""
                  else
                      RELEASE_TAG="ensu-v${version}-beta"
                      RELEASE_BODY="Nightly builds"
                  fi

                  commit_sha="$(git rev-parse HEAD)"

                  echo "should_build=true" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"
                  echo "short_sha=${commit_sha::7}" >> "${GITHUB_OUTPUT}"
                  echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
                  echo "release_body=${RELEASE_BODY}" >> "${GITHUB_OUTPUT}"
                  echo "is_release=${INPUT_RELEASE}" >> "${GITHUB_OUTPUT}"

    release-desktop:
        needs: release-metadata
        if: needs.release-metadata.outputs.should_build == 'true'
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - os: ubuntu-22.04
                      rust-target: x86_64-unknown-linux-gnu
                      bundle-targets: appimage,deb,rpm,updater
                    - os: macos-latest
                      rust-target: x86_64-apple-darwin
                      bundle-targets: app,dmg,updater
                    - os: macos-latest
                      rust-target: aarch64-apple-darwin
                      bundle-targets: app,dmg,updater
                    - os: windows-latest
                      rust-target: x86_64-pc-windows-msvc
                      bundle-targets: nsis,updater

        runs-on: ${{ matrix.platform.os }}
        env:
            COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
            RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.release-metadata.outputs.release_body }}
            HAS_WINDOWS_SIGNING: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_ENDPOINT != '' && secrets.AZURE_CODE_SIGNING_NAME != '' && secrets.AZURE_CERT_PROFILE_NAME != '' }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.release-metadata.outputs.commit_sha }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "yarn"
                  cache-dependency-path: "web/yarn.lock"

            - name: Activate Yarn 1.22.22
              run: |
                  corepack enable
                  corepack prepare yarn@1.22.22 --activate

            # Pin to 1.93.0: Rust 1.94.0 has a trait glob-import regression
            # that breaks wry 0.24.x (SettingsExt not found via traits::*).
            - name: Install Rust 1.93.0
              uses: dtolnay/rust-toolchain@1.93.0
              with:
                  targets: ${{ matrix.platform.rust-target }}

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Rust cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/apps/ensu/src-tauri/target
                  key: ${{ runner.os }}-${{ matrix.platform.rust-target }}-cargo-ensu-release-${{ hashFiles('rust/apps/ensu/src-tauri/Cargo.lock') }}

            - name: Install web dependencies
              working-directory: web
              run: yarn install --frozen-lockfile

            - name: Build WASM
              working-directory: web
              run: yarn build:wasm

            - name: Install Tauri dependencies
              working-directory: rust/apps/ensu
              run: yarn install --frozen-lockfile

            - name: Fetch Rust dependencies
              shell: bash
              working-directory: rust/apps/ensu/src-tauri
              run: cargo fetch

            - name: Install trusted-signing-cli (Windows only)
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              run: cargo install --locked trusted-signing-cli

            - name: Add cargo bin to PATH (Windows only)
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              run: |
                  CARGO_BIN_WIN=$(cygpath -w "$HOME/.cargo/bin")
                  echo "$CARGO_BIN_WIN" >> $GITHUB_PATH

            - name: Resolve Windows signing tool paths
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              run: |
                  TRUSTED_SIGNING_CLI_UNIX="$HOME/.cargo/bin/trusted-signing-cli.exe"
                  if [ ! -f "$TRUSTED_SIGNING_CLI_UNIX" ]; then
                      TRUSTED_SIGNING_CLI_FALLBACK=$(where.exe trusted-signing-cli 2>/dev/null | tr -d '\r' | head -n1 || true)
                      if [ -n "$TRUSTED_SIGNING_CLI_FALLBACK" ]; then
                          TRUSTED_SIGNING_CLI_PATH="$TRUSTED_SIGNING_CLI_FALLBACK"
                      else
                          echo "::error::trusted-signing-cli binary not found"
                          exit 1
                      fi
                  else
                      TRUSTED_SIGNING_CLI_PATH=$(cygpath -w "$TRUSTED_SIGNING_CLI_UNIX")
                  fi

                  AZ_PATH=$(where.exe az.cmd 2>/dev/null | tr -d '\r' | head -n1 || true)
                  if [ -z "$AZ_PATH" ]; then
                      AZ_PATH_FALLBACK=$(where.exe az 2>/dev/null | tr -d '\r' | head -n1 || true)
                      if [ -n "$AZ_PATH_FALLBACK" ] && [ -f "${AZ_PATH_FALLBACK}.cmd" ]; then
                          AZ_PATH="${AZ_PATH_FALLBACK}.cmd"
                      else
                          echo "::warning::az.cmd not found on PATH; relying on trusted-signing-cli default AZURE_CLI_PATH"
                      fi
                  fi

                  SIGNTOOL_PATH=$(powershell -NoProfile -Command "Get-ChildItem 'C:\\Program Files (x86)\\Windows Kits\\10\\bin\\*\\x64\\signtool.exe' -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName" | tr -d '\r' || true)
                  if [ -z "$SIGNTOOL_PATH" ]; then
                      echo "::warning::signtool not auto-detected; relying on trusted-signing-cli default SIGNTOOL_PATH"
                  fi

                  echo "TRUSTED_SIGNING_CLI_PATH=$TRUSTED_SIGNING_CLI_PATH" >> $GITHUB_ENV
                  if [ -n "$AZ_PATH" ]; then
                      echo "AZURE_CLI_PATH=$AZ_PATH" >> $GITHUB_ENV
                  fi
                  if [ -n "$SIGNTOOL_PATH" ]; then
                      echo "SIGNTOOL_PATH=$SIGNTOOL_PATH" >> $GITHUB_ENV
                  fi

            - name: Enable Windows signCommand for Tauri (Azure Trusted Signing)
              if: matrix.platform.os == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
              shell: bash
              env:
                  AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
                  AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
                  TRUSTED_SIGNING_CLI_PATH: ${{ env.TRUSTED_SIGNING_CLI_PATH }}
                  AZURE_CLI_PATH: ${{ env.AZURE_CLI_PATH }}
                  SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
              run: node rust/apps/ensu/scripts/ci-enable-windows-signing.mjs

            - name: Enable updater artifacts for release builds
              shell: bash
              env:
                  ENSU_TAURI_UPDATER_PUBKEY: ${{ vars.ENSU_TAURI_UPDATER_PUBKEY }}
                  ENSU_TAURI_UPDATER_ENDPOINT: ${{ vars.ENSU_TAURI_UPDATER_ENDPOINT }}
                  ENSU_TAURI_REQUIRE_UPDATER_PUBKEY: "1"
              run: node rust/apps/ensu/scripts/ci-enable-updater.mjs

            - name: Ensure ENSU Tauri signing key is configured
              shell: bash
              env:
                  ENSU_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
              run: |
                  if [ -z "${ENSU_TAURI_SIGNING_PRIVATE_KEY}" ]; then
                      echo "::error::Missing ENSU_TAURI_SIGNING_PRIVATE_KEY secret"
                      exit 1
                  fi

            - name: Build and release Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  TAURI_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.MAC_OS_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "Developer ID Application"
                  KEYCHAIN_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  AZURE_CLI_PATH: ${{ env.AZURE_CLI_PATH }}
                  SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
              with:
                  projectPath: rust/apps/ensu
                  tagName: ${{ env.RELEASE_TAG }}
                  releaseName: ${{ env.RELEASE_TAG }}
                  releaseBody: ${{ env.RELEASE_BODY }}
                  releaseCommitish: ${{ env.COMMIT_SHA }}
                  releaseDraft: ${{ needs.release-metadata.outputs.is_release == 'true' }}
                  prerelease: ${{ needs.release-metadata.outputs.is_release != 'true' }}
                  includeDebug: false
                  includeRelease: true
                  includeUpdaterJson: false
                  args: ${{ format('--target {0} --bundles {1} --features updater', matrix.platform.rust-target, matrix.platform.bundle-targets) }}

    build-android:
        needs: release-metadata
        if: needs.release-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-22.04
        env:
            COMMIT_SHA: ${{ needs.release-metadata.outputs.commit_sha }}
            RELEASE_TAG: ${{ needs.release-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.release-metadata.outputs.release_body }}
            SHORT_SHA: ${{ needs.release-metadata.outputs.short_sha }}
            HAS_ANDROID_SIGNING: ${{ secrets.SIGNING_KEY_ENSU != '' && secrets.SIGNING_STORE_PASSWORD_ENSU != '' && secrets.SIGNING_KEY_ALIAS_ENSU != '' && secrets.SIGNING_KEY_PASSWORD_ENSU != '' }}
            HAS_PLAYSTORE_SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT_JSON != '' }}
            SHOULD_UPLOAD_PLAYSTORE: ${{ needs.release-metadata.outputs.is_release == 'true' && secrets.SERVICE_ACCOUNT_JSON != '' }}
            HAS_DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK != '' }}

        defaults:
            run:
                working-directory: mobile/native/android/apps/ensu

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.release-metadata.outputs.commit_sha }}

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install NDK
              run: |
                  echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Generate Android bindings
              run: |
                  cd ../../../../../rust
                  cargo codegen ensu-android

            - name: Print Android release capabilities
              run: |
                  echo "HAS_ANDROID_SIGNING=${HAS_ANDROID_SIGNING}"
                  echo "HAS_PLAYSTORE_SERVICE_ACCOUNT=${HAS_PLAYSTORE_SERVICE_ACCOUNT}"
                  echo "SHOULD_UPLOAD_PLAYSTORE=${SHOULD_UPLOAD_PLAYSTORE}"
                  echo "HAS_DISCORD_WEBHOOK=${HAS_DISCORD_WEBHOOK}"

            - name: Setup signing keys
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  KEYSTORE_PATH=$(pwd)/ensu-release.keystore
                  echo "${{ secrets.SIGNING_KEY_ENSU }}" | base64 -d > "$KEYSTORE_PATH"
                  cat > key.properties << EOF
                  storeFile=$KEYSTORE_PATH
                  storePassword=${{ secrets.SIGNING_STORE_PASSWORD_ENSU }}
                  keyAlias=${{ secrets.SIGNING_KEY_ALIAS_ENSU }}
                  keyPassword=${{ secrets.SIGNING_KEY_PASSWORD_ENSU }}
                  EOF

            - name: Build signed Android artifacts
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  if [ "${SHOULD_UPLOAD_PLAYSTORE}" = "true" ]; then
                      ./gradlew :app-ui:assembleRelease :app-ui:bundleRelease
                  else
                      ./gradlew :app-ui:assembleRelease
                  fi

            - name: Prepare Android APK for GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              run: |
                  mkdir -p artifacts
                  cp app-ui/build/outputs/apk/release/app-ui-release.apk artifacts/${{ env.RELEASE_TAG }}.apk

            - name: Upload Android APK to GitHub release
              if: env.HAS_ANDROID_SIGNING == 'true'
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  commit: ${{ env.COMMIT_SHA }}
                  artifacts: mobile/native/android/apps/ensu/artifacts/${{ env.RELEASE_TAG }}.apk
                  allowUpdates: true
                  draft: ${{ needs.release-metadata.outputs.is_release == 'true' }}
                  prerelease: ${{ needs.release-metadata.outputs.is_release != 'true' }}
                  updateOnlyUnreleased: true

            - name: Upload AAB to PlayStore
              if: env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true'
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.ensu
                  releaseFiles: mobile/native/android/apps/ensu/app-ui/build/outputs/bundle/release/app-ui-release.aab
                  track: internal
                  changesNotSentForReview: false

            - name: Notify Discord
              if: success() && env.HAS_ANDROID_SIGNING == 'true' && env.SHOULD_UPLOAD_PLAYSTORE == 'true' && env.HAS_DISCORD_WEBHOOK == 'true'
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  nodetail: true
                  title: "🤖 Internal release available for Ensu"
                  description: |
                      ${{ env.RELEASE_TAG }} ([${{ env.SHORT_SHA }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ env.COMMIT_SHA }})) · [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }})
                  color: 0xFDCE13

    cleanup-release:
        needs: [release-metadata, release-desktop, build-android]
        if: needs.release-metadata.outputs.is_release == 'true'
        runs-on: ubuntu-22.04

        steps:
            - name: Delete matching beta release, tag, and release branch
              env:
                  GH_TOKEN: ${{ github.token }}
                  BETA_TAG: ${{ needs.release-metadata.outputs.release_tag }}-beta
                  RELEASE_BRANCH: release/${{ needs.release-metadata.outputs.release_tag }}
              run: |
                  set -euo pipefail

                  gh release delete "${BETA_TAG}" --yes || true
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${BETA_TAG}" >/dev/null 2>&1 || true
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${RELEASE_BRANCH}" >/dev/null 2>&1 || true
