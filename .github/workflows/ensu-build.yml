name: "Build (Ensu)"

# See .github/docs/app-release.md

on:
    push:
        branches:
            - "release/ensu-v*"
    workflow_dispatch:
    schedule:
        # Run every weekday at ~5:45 AM IST
        - cron: "15 0 * * 1-5"

env:
    NDK_VERSION: "27.3.13750724"
    BUILD_NUMBER_BASE: "33"

permissions:
    contents: write

concurrency:
    group: ensu-build
    cancel-in-progress: false

jobs:
    build-metadata:
        runs-on: ubuntu-latest

        outputs:
            should_build: ${{ steps.prepare.outputs.should_build }}
            commit_sha: ${{ steps.prepare.outputs.commit_sha }}
            build_number: ${{ steps.prepare.outputs.build_number }}
            release_tag: ${{ steps.prepare.outputs.release_tag }}
            release_title: ${{ steps.prepare.outputs.release_title }}
            release_body: ${{ steps.prepare.outputs.release_body }}
            release_body_grouped: ${{ steps.prepare.outputs.release_body_grouped }}
            has_new_changes: ${{ steps.prepare.outputs.has_new_changes }}
            play_store_release_notes: ${{ steps.prepare.outputs.play_store_release_notes }}
            android_apk_name: ${{ steps.prepare.outputs.android_apk_name }}

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.ref_name }}

            - name: Prepare release
              id: prepare
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && git ls-remote --exit-code --heads origin 'release/ensu-v*' >/dev/null 2>&1; then
                      echo "Active Ensu release branch found; skipping scheduled nightly"
                      echo "should_build=false" >> "${GITHUB_OUTPUT}"
                      exit 0
                  fi

                  version="$(node .github/scripts/ensu-version.mjs get)"
                  release_version="${version%-beta}"
                  build_number=$((BUILD_NUMBER_BASE + GITHUB_RUN_NUMBER))

                  if [[ "${GITHUB_REF_NAME}" == release/ensu-v* ]]; then
                      if [[ "${version}" != "${release_version}" ]]; then
                          echo "::error::${GITHUB_REF_NAME} is ${version}, expected ${release_version}"
                          exit 1
                      fi
                      if [[ "${GITHUB_REF_NAME}" != "release/ensu-v${release_version}" ]]; then
                          echo "::error::Branch ${GITHUB_REF_NAME} does not match Ensu version ${release_version}"
                          exit 1
                      fi
                      release_tag="ensu-v${release_version}-rc"
                      release_title="🤖 Ensu release candidate · ${release_version} (build ${build_number})"
                  else
                      if [[ "${version}" != "${release_version}-beta" ]]; then
                          echo "::error::${GITHUB_REF_NAME} is ${version}, expected ${release_version}-beta"
                          exit 1
                      fi
                      release_tag="ensu-v${release_version}-beta"
                      release_title="🤖 Ensu nightly · ${version} (build ${build_number})"
                  fi

                  commit_sha="$(git rev-parse HEAD)"
                  git fetch --force --depth=1 --no-tags origin "refs/tags/${release_tag}:refs/tags/${release_tag}" || true

                  echo "should_build=true" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"
                  echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
                  echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
                  echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
                  echo "android_apk_name=${release_tag%-rc}.apk" >> "${GITHUB_OUTPUT}"
                  node .github/scripts/release-notes.mjs rust/apps/ensu/changes "${release_tag}" >> "${GITHUB_OUTPUT}"

    build-desktop:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        environment:
            name: production
        strategy:
            fail-fast: false
            matrix:
                platform:
                    # Tauri docs recommend building Linux release bundles on the
                    # oldest supported runtime OS with WebKitGTK 4.1, so that
                    # AppImage/deb/rpm artifacts keep a low glibc baseline.
                    - os: ubuntu-22.04
                      rust-target: x86_64-unknown-linux-gnu
                      bundle-targets: appimage,deb,rpm
                    # A single universal (arm64 + x86_64) build, so that there
                    # is one dmg that works on all Macs, and existing installs
                    # of either architecture converge onto it via the updater.
                    - os: macos-latest
                      rust-target: universal-apple-darwin
                      bundle-targets: app,dmg
                    - os: windows-latest
                      rust-target: x86_64-pc-windows-msvc
                      bundle-targets: nsis

        runs-on: ${{ matrix.platform.os }}
        env:
            COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: "web/package-lock.json"

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Install macOS Rust targets
              if: matrix.platform.rust-target == 'universal-apple-darwin'
              run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

            - name: Install web dependencies
              working-directory: web
              run: npm ci

            - name: Build WASM
              working-directory: web
              run: npm run build:wasm

            - name: Install Tauri dependencies
              run: npm ci --prefix rust/apps/ensu

            - name: Check Tauri updater public key
              if: vars.ENSU_TAURI_UPDATER_PUBKEY == ''
              run: exit 1

            - name: Write Tauri config override (updater)
              if: matrix.platform.os != 'windows-latest'
              run: |
                  cat > rust/apps/ensu/tauri.ci.conf.json <<'EOF'
                  {
                      "plugins": {
                          "updater": {
                              "pubkey": ${{ toJSON(vars.ENSU_TAURI_UPDATER_PUBKEY) }}
                          }
                      },
                      "bundle": {
                          "createUpdaterArtifacts": "v1Compatible"
                      }
                  }
                  EOF

            - name: Write Tauri config override (updater + Windows signing)
              if: matrix.platform.os == 'windows-latest'
              shell: bash
              run: |
                  cargo install --locked artifact-signing-cli --version 0.11.0
                  echo "$(cygpath -w "$HOME/.cargo/bin")" >> $GITHUB_PATH
                  SIGNTOOL_PATH=$(powershell -NoProfile -Command "Get-ChildItem 'C:\\Program Files (x86)\\Windows Kits\\10\\bin\\*\\x64\\signtool.exe' -ErrorAction Stop | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName" | tr -d '\r')
                  echo "SIGNTOOL_PATH=$SIGNTOOL_PATH" >> $GITHUB_ENV

                  cat > rust/apps/ensu/tauri.ci.conf.json <<'EOF'
                  {
                      "plugins": {
                          "updater": {
                              "pubkey": ${{ toJSON(vars.ENSU_TAURI_UPDATER_PUBKEY) }}
                          }
                      },
                      "bundle": {
                          "createUpdaterArtifacts": "v1Compatible",
                          "windows": {
                              "signCommand": ${{ toJSON(format('artifact-signing-cli -e {0} -a {1} -c {2} -d Ensu %1', secrets.AZURE_ENDPOINT, secrets.AZURE_CODE_SIGNING_NAME, secrets.AZURE_CERT_PROFILE_NAME)) }}
                          }
                      }
                  }
                  EOF

            - name: Mint nightly token
              id: nightly_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: nightly
                  permission-contents: write

            - name: Build and release Tauri app
              id: tauri
              uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
              env:
                  GITHUB_TOKEN: ${{ steps.nightly_token.outputs.token }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.MAC_OS_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "Developer ID Application"
                  KEYCHAIN_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
              with:
                  projectPath: rust/apps/ensu
                  repo: nightly
                  tagName: ${{ env.RELEASE_TAG }}
                  releaseName: ${{ env.RELEASE_TAG }}
                  releaseBody: ${{ env.RELEASE_BODY }}
                  # Tag off nightly's default branch; the build commit isn't in that repo.
                  releaseCommitish: main
                  releaseDraft: false
                  prerelease: true
                  includeDebug: false
                  includeRelease: true
                  includeUpdaterJson: false
                  args: ${{ format('--target {0} --bundles {1} --config tauri.ci.conf.json', matrix.platform.rust-target, matrix.platform.bundle-targets) }}

            # tauri-action emits JSON; ncipollo expects comma-delimited artifact paths.
            - name: Collect RC artifact list
              if: startsWith(github.ref_name, 'release/')
              id: rc_artifacts
              shell: bash
              env:
                  ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
              run: |
                  list="$(jq -rn 'env.ARTIFACT_PATHS | fromjson | join(",")')"
                  printf 'list=%s\n' "${list}" >> "${GITHUB_OUTPUT}"

            - name: Upload desktop artifacts to RC draft
              if: startsWith(github.ref_name, 'release/')
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  commit: ${{ env.COMMIT_SHA }}
                  artifacts: ${{ steps.rc_artifacts.outputs.list }}
                  draft: true
                  allowUpdates: true
                  updateOnlyUnreleased: true

    build-android:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        environment:
            name: production
        env:
            COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
            BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}
            PLAY_STORE_RELEASE_NOTES: ${{ needs.build-metadata.outputs.play_store_release_notes }}
            ANDROID_APK_NAME: ${{ needs.build-metadata.outputs.android_apk_name }}

        defaults:
            run:
                working-directory: mobile/native/android/apps/ensu

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup JDK 17
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

            - name: Install NDK
              run: |
                  echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

            - run: cargo codegen native
              working-directory: rust

            - name: Setup signing keys
              env:
                  SIGNING_KEY_ENSU: ${{ secrets.SIGNING_KEY_ENSU }}
                  SIGNING_STORE_PASSWORD_ENSU: ${{ secrets.SIGNING_STORE_PASSWORD_ENSU }}
                  SIGNING_KEY_ALIAS_ENSU: ${{ secrets.SIGNING_KEY_ALIAS_ENSU }}
                  SIGNING_KEY_PASSWORD_ENSU: ${{ secrets.SIGNING_KEY_PASSWORD_ENSU }}
              run: |
                  KEYSTORE_PATH=$(pwd)/ensu-release.keystore
                  printf '%s' "${SIGNING_KEY_ENSU}" | base64 -d > "$KEYSTORE_PATH"
                  cat > key.properties << EOF
                  storeFile=$KEYSTORE_PATH
                  storePassword=${SIGNING_STORE_PASSWORD_ENSU}
                  keyAlias=${SIGNING_KEY_ALIAS_ENSU}
                  keyPassword=${SIGNING_KEY_PASSWORD_ENSU}
                  EOF

            - name: Build signed Android artifacts
              run: ./gradlew -PversionCode="${BUILD_NUMBER}" :app-ui:assembleRelease :app-ui:bundleRelease

            - name: Prepare whatsnew
              run: |
                  mkdir -p whatsnew
                  printf '%s' "${PLAY_STORE_RELEASE_NOTES}" > whatsnew/whatsnew-en-US

            - name: Prepare Android APK for GitHub release
              run: |
                  mkdir -p artifacts
                  cp app-ui/build/outputs/apk/release/app-ui-release.apk "artifacts/${ANDROID_APK_NAME}"

            - name: Mint nightly token
              id: nightly_token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.ENTE_CI_GH_CLIENT_ID }}
                  private-key: ${{ secrets.ENTE_CI_GH_APP_PRIVATE_KEY }}
                  repositories: nightly
                  permission-contents: write

            - name: Upload Android APK to nightly release
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  repo: nightly
                  token: ${{ steps.nightly_token.outputs.token }}
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  artifacts: mobile/native/android/apps/ensu/artifacts/${{ env.ANDROID_APK_NAME }}
                  prerelease: true
                  makeLatest: false
                  allowUpdates: true
                  updateOnlyUnreleased: true

            - name: Upload Android APK to RC draft
              if: startsWith(github.ref_name, 'release/')
              uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  commit: ${{ env.COMMIT_SHA }}
                  artifacts: mobile/native/android/apps/ensu/artifacts/${{ env.ANDROID_APK_NAME }}
                  draft: true
                  allowUpdates: true
                  updateOnlyUnreleased: true

            - name: Upload AAB to Play Store
              uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.ensu
                  releaseFiles: mobile/native/android/apps/ensu/app-ui/build/outputs/bundle/release/app-ui-release.aab
                  tracks: internal
                  whatsNewDirectory: mobile/native/android/apps/ensu/whatsnew

    build-ios:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: macos-26
        environment:
            name: production

        defaults:
            run:
                working-directory: mobile/native/apple/apps/ensu

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - run: cargo codegen native
              working-directory: rust

            - name: Import Apple Distribution certificate
              uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
              with:
                  p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
                  p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}

            - name: Archive and upload Ensu to TestFlight
              env:
                  ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
                  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
              run: |
                  key_path="${RUNNER_TEMP}/AuthKey_${ASC_KEY_ID}.p8"
                  printf '%s' "${ASC_API_KEY_BASE64}" | base64 --decode > "${key_path}"

                  xcodebuild archive \
                      -project Ensu.xcodeproj \
                      -scheme Ensu \
                      -configuration Release \
                      -destination 'generic/platform=iOS' \
                      -archivePath build/Ensu.xcarchive \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
                      CODE_SIGN_STYLE=Manual \
                      CODE_SIGN_IDENTITY="Apple Distribution" \
                      DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
                      APP_STORE_PROFILE_SPECIFIER="Ensu App Store" \
                      CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"

                  xcodebuild -exportArchive \
                      -archivePath build/Ensu.xcarchive \
                      -exportPath build/Export \
                      -exportOptionsPlist scripts/ExportOptions-AppStore-CI.plist \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}"

    finish-build:
        needs: [build-metadata, build-desktop, build-android, build-ios]
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout built commit
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Point release tag at the successfully built commit
              env:
                  COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: |
                  git tag --force "${RELEASE_TAG}" "${COMMIT_SHA}"
                  git push --force origin "refs/tags/${RELEASE_TAG}"

            - name: Notify Discord
              if: github.event_name != 'schedule' || needs.build-metadata.outputs.has_new_changes == 'true'
              continue-on-error: true
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  RELEASE_TITLE: ${{ needs.build-metadata.outputs.release_title }}
                  RELEASE_BODY_GROUPED: ${{ needs.build-metadata.outputs.release_body_grouped }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: node .github/scripts/release-notify.mjs ensu "${RELEASE_TAG}"
