name: "Build (ensu)"

# See .github/docs/ensu-release.md

on:
    push:
        branches:
            - "release/ensu-v*"
    workflow_dispatch:
    schedule:
        # Run every weekday at ~7:15 AM IST
        - cron: "45 1 * * 1-5"

env:
    NDK_VERSION: "27.3.13750724"
    BUILD_NUMBER_BASE: "33"

permissions:
    contents: write

concurrency:
    group: ensu-build
    cancel-in-progress: false

jobs:
    build-metadata:
        runs-on: ubuntu-22.04

        outputs:
            should_build: ${{ steps.prepare.outputs.should_build }}
            commit_sha: ${{ steps.prepare.outputs.commit_sha }}
            build_number: ${{ steps.prepare.outputs.build_number }}
            release_tag: ${{ steps.prepare.outputs.release_tag }}
            release_title: ${{ steps.prepare.outputs.release_title }}
            release_body: ${{ steps.prepare.outputs.release_body }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}

            - name: Prepare release
              id: prepare
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]] && git ls-remote --exit-code --heads origin 'release/ensu-v*' >/dev/null 2>&1; then
                      echo "Active Ensu release branch found; skipping scheduled nightly"
                      echo "should_build=false" >> "${GITHUB_OUTPUT}"
                      exit 0
                  fi

                  version="$(node .github/scripts/ensu-version.mjs get)"
                  release_version="${version%-beta}"
                  build_number=$((BUILD_NUMBER_BASE + GITHUB_RUN_NUMBER))

                  if [[ "${GITHUB_REF_NAME}" == release/ensu-v* ]]; then
                      if [[ "${version}" != "${release_version}" ]]; then
                          echo "::error::${GITHUB_REF_NAME} is ${version}, expected ${release_version}"
                          exit 1
                      fi
                      if [[ "${GITHUB_REF_NAME}" != "release/ensu-v${release_version}" ]]; then
                          echo "::error::Branch ${GITHUB_REF_NAME} does not match Ensu version ${release_version}"
                          exit 1
                      fi
                      release_tag="ensu-v${release_version}-rc"
                      release_title="Ensu release candidate · ${release_version} (build ${build_number})"
                  else
                      if [[ "${version}" != "${release_version}-beta" ]]; then
                          echo "::error::${GITHUB_REF_NAME} is ${version}, expected ${release_version}-beta"
                          exit 1
                      fi
                      release_tag="ensu-v${release_version}-beta"
                      release_title="Ensu nightly · ${version} (build ${build_number})"
                  fi

                  commit_sha="$(git rev-parse HEAD)"

                  echo "should_build=true" >> "${GITHUB_OUTPUT}"
                  echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"
                  echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
                  echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
                  echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
                  {
                      echo "release_body<<EOF"
                      find rust/apps/ensu/changes -maxdepth 1 -type f -name '*.md' ! -name README.md | sort | xargs awk 1
                      echo "EOF"
                  } >> "${GITHUB_OUTPUT}"

    build-desktop:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        strategy:
            fail-fast: false
            matrix:
                platform:
                    - os: ubuntu-22.04
                      rust-target: x86_64-unknown-linux-gnu
                      bundle-targets: appimage,deb,rpm,updater
                    - os: macos-latest
                      rust-target: x86_64-apple-darwin
                      bundle-targets: app,dmg,updater
                    - os: macos-latest
                      rust-target: aarch64-apple-darwin
                      bundle-targets: app,dmg,updater
                    - os: windows-latest
                      rust-target: x86_64-pc-windows-msvc
                      bundle-targets: nsis,updater

        runs-on: ${{ matrix.platform.os }}
        env:
            COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "yarn"
                  cache-dependency-path: "web/yarn.lock"

            - name: Activate Yarn 1.22.22
              run: |
                  corepack enable
                  corepack prepare yarn@1.22.22 --activate

            # Pin to 1.93.0: Rust 1.94.0 has a trait glob-import regression
            # that breaks wry 0.24.x (SettingsExt not found via traits::*).
            - name: Install Rust 1.93.0
              uses: dtolnay/rust-toolchain@1.93.0
              with:
                  targets: ${{ matrix.platform.rust-target }}

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libsoup2.4-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

            - name: Rust cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      rust/apps/ensu/src-tauri/target
                  key: ${{ runner.os }}-${{ matrix.platform.rust-target }}-cargo-ensu-release-${{ hashFiles('rust/apps/ensu/src-tauri/Cargo.lock') }}

            - name: Install web dependencies
              working-directory: web
              run: yarn install --frozen-lockfile

            - name: Build WASM
              working-directory: web
              run: yarn build:wasm

            - name: Install Tauri dependencies
              working-directory: rust/apps/ensu
              run: yarn install --frozen-lockfile

            - name: Fetch Rust dependencies
              shell: bash
              working-directory: rust/apps/ensu/src-tauri
              run: cargo fetch

            - name: Prepare Windows signing
              if: matrix.platform.os == 'windows-latest'
              shell: bash
              env:
                  AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
                  AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
                  AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
              run: |
                  cargo install --locked trusted-signing-cli
                  echo "$(cygpath -w "$HOME/.cargo/bin")" >> $GITHUB_PATH
                  SIGNTOOL_PATH=$(powershell -NoProfile -Command "Get-ChildItem 'C:\\Program Files (x86)\\Windows Kits\\10\\bin\\*\\x64\\signtool.exe' -ErrorAction Stop | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName" | tr -d '\r')
                  test -n "$SIGNTOOL_PATH"
                  echo "SIGNTOOL_PATH=$SIGNTOOL_PATH" >> $GITHUB_ENV

                  node rust/apps/ensu/scripts/ci-enable-windows-signing.mjs

            - name: Enable updater artifacts for release builds
              shell: bash
              env:
                  ENSU_TAURI_UPDATER_PUBKEY: ${{ vars.ENSU_TAURI_UPDATER_PUBKEY }}
                  ENSU_TAURI_UPDATER_ENDPOINT: ${{ vars.ENSU_TAURI_UPDATER_ENDPOINT }}
                  ENSU_TAURI_REQUIRE_UPDATER_PUBKEY: "1"
              run: node rust/apps/ensu/scripts/ci-enable-updater.mjs

            - name: Build and release Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  TAURI_PRIVATE_KEY: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_KEY_PASSWORD: ${{ secrets.ENSU_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.MAC_OS_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: "Developer ID Application"
                  KEYCHAIN_PASSWORD: ${{ secrets.MAC_OS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
              with:
                  projectPath: rust/apps/ensu
                  tagName: ${{ env.RELEASE_TAG }}
                  releaseName: ${{ env.RELEASE_TAG }}
                  releaseBody: ${{ env.RELEASE_BODY }}
                  releaseCommitish: ${{ env.COMMIT_SHA }}
                  releaseDraft: true
                  prerelease: false
                  includeDebug: false
                  includeRelease: true
                  includeUpdaterJson: false
                  args: ${{ format('--target {0} --bundles {1} --features updater', matrix.platform.rust-target, matrix.platform.bundle-targets) }}

    build-android:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-22.04
        env:
            COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
            BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
            RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
            RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}

        defaults:
            run:
                working-directory: mobile/native/android/apps/ensu

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install NDK
              run: |
                  echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
                  echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Generate Android bindings
              run: |
                  cd ../../../../../rust
                  cargo codegen ensu-android

            - name: Setup signing keys
              run: |
                  KEYSTORE_PATH=$(pwd)/ensu-release.keystore
                  echo "${{ secrets.SIGNING_KEY_ENSU }}" | base64 -d > "$KEYSTORE_PATH"
                  cat > key.properties << EOF
                  storeFile=$KEYSTORE_PATH
                  storePassword=${{ secrets.SIGNING_STORE_PASSWORD_ENSU }}
                  keyAlias=${{ secrets.SIGNING_KEY_ALIAS_ENSU }}
                  keyPassword=${{ secrets.SIGNING_KEY_PASSWORD_ENSU }}
                  EOF

            - name: Build signed Android artifacts
              run: ./gradlew -PversionCode="${BUILD_NUMBER}" :app-ui:assembleRelease :app-ui:bundleRelease

            - name: Prepare whatsnew
              run: |
                  mkdir -p whatsnew
                  echo "${RELEASE_BODY}" | head -c 500 > whatsnew/whatsnew-en-US

            - name: Prepare Android APK for GitHub release
              run: |
                  mkdir -p artifacts
                  cp app-ui/build/outputs/apk/release/app-ui-release.apk artifacts/${{ env.RELEASE_TAG }}.apk

            - name: Upload Android APK to GitHub release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_TAG }}
                  body: ${{ env.RELEASE_BODY }}
                  commit: ${{ env.COMMIT_SHA }}
                  artifacts: mobile/native/android/apps/ensu/artifacts/${{ env.RELEASE_TAG }}.apk
                  allowUpdates: true
                  draft: true
                  prerelease: false
                  updateOnlyUnreleased: true

            - name: Upload AAB to Play Store
              uses: r0adkll/upload-google-play@v1
              with:
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: io.ente.ensu
                  releaseFiles: mobile/native/android/apps/ensu/app-ui/build/outputs/bundle/release/app-ui-release.aab
                  track: internal
                  whatsNewDirectory: mobile/native/android/apps/ensu/whatsnew
                  changesNotSentForReview: false

    build-ios:
        needs: build-metadata
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: macos-26

        defaults:
            run:
                working-directory: mobile/native/darwin/Apps/Ensu

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Generate iOS bindings
              working-directory: rust
              run: cargo codegen ensu-ios

            - name: Import Apple Distribution certificate
              uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
              with:
                  p12-file-base64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
                  p12-password: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}

            - name: Archive and upload Ensu to TestFlight
              env:
                  ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
                  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
                  ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APP_STORE_PROFILE_SPECIFIER: Ensu App Store
                  BUILD_NUMBER: ${{ needs.build-metadata.outputs.build_number }}
              run: |
                  key_path="${RUNNER_TEMP}/AuthKey_${ASC_KEY_ID}.p8"
                  printf '%s' "${ASC_API_KEY_BASE64}" | base64 --decode > "${key_path}"

                  xcodebuild archive \
                      -project Ensu.xcodeproj \
                      -scheme Ensu \
                      -configuration Release \
                      -destination 'generic/platform=iOS' \
                      -archivePath build/Ensu.xcarchive \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}" \
                      CODE_SIGN_STYLE=Manual \
                      CODE_SIGN_IDENTITY="Apple Distribution" \
                      DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
                      APP_STORE_PROFILE_SPECIFIER="${APP_STORE_PROFILE_SPECIFIER}" \
                      CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"

                  xcodebuild -exportArchive \
                      -archivePath build/Ensu.xcarchive \
                      -exportPath build/Export \
                      -exportOptionsPlist scripts/ExportOptions-AppStore-CI.plist \
                      -allowProvisioningUpdates \
                      -authenticationKeyPath "${key_path}" \
                      -authenticationKeyID "${ASC_KEY_ID}" \
                      -authenticationKeyIssuerID "${ASC_ISSUER_ID}"

    finish-build:
        needs: [build-metadata, build-desktop, build-android, build-ios]
        if: needs.build-metadata.outputs.should_build == 'true'
        runs-on: ubuntu-22.04

        steps:
            - name: Checkout built commit
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.build-metadata.outputs.commit_sha }}

            - name: Point release tag at the successfully built commit
              env:
                  COMMIT_SHA: ${{ needs.build-metadata.outputs.commit_sha }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: |
                  set -euo pipefail

                  git tag --force "${RELEASE_TAG}" "${COMMIT_SHA}"
                  git push --force origin "refs/tags/${RELEASE_TAG}"

            - name: Notify Discord
              continue-on-error: true
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_INTERNAL_RELEASE_WEBHOOK }}
                  RELEASE_BODY: ${{ needs.build-metadata.outputs.release_body }}
                  RELEASE_TAG: ${{ needs.build-metadata.outputs.release_tag }}
              run: |
                  download_line="-# Download: [Play Store](https://play.google.com/store/apps/details?id=io.ente.ensu) | [TestFlight](https://appstoreconnect.apple.com/apps/6758197006/testflight/ios) | [GitHub Release](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG})"

                  jq -n \
                      --arg title "${{ needs.build-metadata.outputs.release_title }}" \
                      --arg body "${RELEASE_BODY}" \
                      --arg download_line "${download_line}" \
                      '{embeds: [{title: $title, description: ($body + "\n" + $download_line), color: 16633363}]}' \
                      | curl -fsSL -H 'Content-Type: application/json' -d @- "${DISCORD_WEBHOOK}"
