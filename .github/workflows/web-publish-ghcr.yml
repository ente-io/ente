name: "Publish ghcr (web)"

on:
    # Run automatically every Wednesday, at 07:00 UTC.
    schedule:
        - cron: '0 7 * * 3'
    # Run manually if needed to publish out of schedule.
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Log in to GHCR
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: printf '%s' "${GITHUB_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

            - name: Build and push
              run: |
                  docker buildx create --use
                  docker buildx build --push \
                      --file web/Dockerfile \
                      --platform linux/amd64,linux/arm64 \
                      --tag ghcr.io/ente-io/web:${GITHUB_SHA} \
                      --tag ghcr.io/ente-io/web:latest \
                      .
