name: "Setup Flutter"
description: "Install the Flutter SDK version used by Ente CI"

runs:
    using: "composite"
    steps:
        - shell: bash
          env:
              FLUTTER_VERSION: "3.38.10"
          run: |
              set -euo pipefail

              base_url="https://storage.googleapis.com/flutter_infra_release/releases"
              case "$RUNNER_OS-$RUNNER_ARCH" in
              Linux-X64) archive="stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz" ;;
              macOS-X64) archive="stable/macos/flutter_macos_${FLUTTER_VERSION}-stable.zip" ;;
              macOS-ARM64) archive="stable/macos/flutter_macos_arm64_${FLUTTER_VERSION}-stable.zip" ;;
              Windows-X64) archive="stable/windows/flutter_windows_${FLUTTER_VERSION}-stable.zip" ;;
              esac

              temp_dir="$RUNNER_TEMP"
              if [ "$RUNNER_OS" = Windows ]; then
                  temp_dir="$(cygpath -u "$temp_dir")"
              fi

              install_root="$temp_dir/flutter-sdk"
              flutter_root="$install_root/flutter"

              github_path() {
                  if [ "$RUNNER_OS" = Windows ]; then
                      cygpath -w "$1"
                  else
                      printf '%s\n' "$1"
                  fi
              }

              archive_name="${archive##*/}"
              archive_path="$temp_dir/$archive_name"

              curl -fsSL "$base_url/$archive" -o "$archive_path"
              mkdir -p "$install_root"
              case "$archive_name" in
              *.zip) unzip -q -o "$archive_path" -d "$install_root" ;;
              *) tar xf "$archive_path" -C "$install_root" ;;
              esac
              rm -f "$archive_path"

              github_path "$flutter_root/bin" >>"$GITHUB_PATH"
