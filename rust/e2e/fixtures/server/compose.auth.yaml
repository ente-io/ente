# Auth/recovery-only Docker fixture for rust/e2e.

services:
  museum:
    build:
      context: ../../../../server
      args:
        GIT_COMMIT: development-cluster
    ports:
      - ${ENTE_MUSEUM_PORT:-18080}:8080
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENTE_CREDENTIALS_FILE: /credentials.yaml
    configs:
      - source: credentials_yaml
        target: /credentials.yaml
    volumes:
      - ./museum.yaml:/museum.yaml:ro
      - ../../../../server/data:/data:ro

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: ente_db
    healthcheck:
      test: pg_isready -q -d ente_db -U pguser
      start_period: 40s
      start_interval: 1s
    volumes:
      - postgres-data:/var/lib/postgresql/data

configs:
  credentials_yaml:
    content: |
      db:
          host: postgres
          port: 5432
          name: ente_db
          user: pguser
          password: pgpass

      # Museum bootstrap still expects S3 credentials in the config even though
      # the baseline rust/e2e suite does not exercise object storage.
      s3:
          are_local_buckets: true
          b2-eu-cen:
              key: changeme
              secret: changeme1234
              endpoint: localhost:3200
              region: eu-central-2
              bucket: b2-eu-cen
          wasabi-eu-central-2-v3:
              key: changeme
              secret: changeme1234
              endpoint: localhost:3200
              region: eu-central-2
              bucket: wasabi-eu-central-2-v3
              compliance: false
          scw-eu-fr-v3:
              key: changeme
              secret: changeme1234
              endpoint: localhost:3200
              region: eu-central-2
              bucket: scw-eu-fr-v3

volumes:
  postgres-data:
