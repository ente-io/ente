[package]
name = "ensu-db"
edition = "2024"

[dependencies]
ente-core.workspace = true
ente-image.workspace = true
rusqlite = { version = "0.38", features = ["bundled"], optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "rng-getrandom"] }
zeroize = { version = "1.8", features = ["derive"] }

[features]
default = ["sqlite"]
sqlite = ["dep:rusqlite"]
