[package]
name = "ensu-transcription"
edition = "2024"

[dependencies]
flate2 = "1"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "http2", "charset", "system-proxy", "rustls-tls-webpki-roots"] }
rubato = "0.16"
tar = "0.4"
thiserror = "2"
transcribe-rs = { version = "0.3.11", default-features = false, features = ["onnx", "vad-silero"] }

[target.'cfg(target_os = "android")'.dependencies]
ort = { version = "=2.0.0-rc.12", default-features = false, features = ["load-dynamic"] }
