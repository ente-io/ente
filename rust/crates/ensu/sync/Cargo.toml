[package]
name = "ensu-sync"
edition = "2024"

[dependencies]
ensu-db.workspace = true
ente-core.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["json", "blocking", "http2", "charset", "system-proxy", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4", "rng-getrandom"] }
hkdf = "0.13"
sha2 = "0.11"
zeroize = "1"

[dev-dependencies]
httpmock = "0.7"
tempfile = "3"
