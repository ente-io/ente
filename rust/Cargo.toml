[workspace]
resolver = "2"
members = [
    "apps/cli",
    "apps/codegen",
    "apps/ensu/src-tauri",
    "bindings/ffi/crypto",
    "bindings/frb/ente-rust",
    "bindings/frb/photos",
    "bindings/uniffi/core",
    "bindings/uniffi/ensu/db",
    "bindings/uniffi/ensu/inference",
    "bindings/uniffi/ensu/sync",
    "bindings/uniffi/ensu/transcription",
    "bindings/wasm/ente-wasm",
    "crates/accounts",
    "crates/contacts",
    "crates/core",
    "crates/ensu/db",
    "crates/ensu/inference",
    "crates/ensu/sync",
    "crates/ensu/transcription",
    "crates/image",
    "crates/photos",
    "e2e",
]

[workspace.dependencies]
ensu-db = { path = "crates/ensu/db" }
ensu-sync = { path = "crates/ensu/sync" }
ensu-transcription = { path = "crates/ensu/transcription" }
ente-accounts = { path = "crates/accounts" }
ente-contacts = { path = "crates/contacts" }
ente-core = { path = "crates/core" }
ente-rs = { path = "apps/cli" }
ente_image = { path = "crates/image" }
ente_photos = { path = "crates/photos" }
inference_rs = { path = "crates/ensu/inference" }
