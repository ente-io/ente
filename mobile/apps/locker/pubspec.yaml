name: locker
description: "Ente Locker – Safe space for your important documents"
publish_to: "none"
version: 1.0.2+96
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  adaptive_theme: 3.7.2
  app_links: 6.4.1
  bip39: 1.0.6
  collection: 1.19.1
  convert: 3.1.2
  crypto: 3.0.7
  dio: 5.9.0
  dots_indicator: 3.1.0
  dotted_border: 3.1.0
  email_validator: 3.0.0
  ente_accounts:
    path: ../../packages/accounts
  ente_base:
    path: ../../packages/base
  ente_configuration:
    path: ../../packages/configuration
  ente_contacts:
    path: ../../packages/contacts
  ente_crypto_api:
    path: ../../packages/ente_crypto_api
  ente_crypto_dart_adapter:
    path: ../../packages/ente_crypto_dart_adapter
  ente_events:
    path: ../../packages/events
  ente_icons:
    path: ../../packages/ente_icons
  ente_legacy: 
    path: ../../packages/legacy
  ente_lock_screen:
    path: ../../packages/lock_screen
  ente_logging:
    path: ../../packages/logging
  ente_network:
    path: ../../packages/network
  ente_pure_utils:
    path: ../../packages/ente_pure_utils
  ente_rust:
    path: ../../packages/rust
  ente_sharing:
    path: ../../packages/sharing
  ente_strings:
    path: ../../packages/strings
  ente_ui:
    path: ../../packages/ui
  ente_utils:
    path: ../../packages/utils
  event_bus: 2.0.1
  expandable: 5.0.1
  fast_base58: 0.2.1
  file_picker: 10.3.10
  file_saver: 0.3.1
  flutter:
    sdk: flutter
  flutter_displaymode: 0.6.0
  flutter_local_authentication:
    git:
      url: https://github.com/eaceto/flutter_local_authentication
      ref: 1ac346a04592a05fd75acccf2e01fa3c7e955d96
  flutter_localizations:
    sdk: flutter
  flutter_svg: 2.2.3
  hugeicons: 1.1.5
  intl: 0.20.2
  io: 1.0.5
  listen_sharing_intent: 1.9.2
  logging: 1.3.0
  open_file: 3.5.11
  package_info_plus: 8.3.1
  path: 1.9.1
  path_provider: 2.1.5
  share_plus: 11.1.0
  shared_preferences: 2.5.3
  sqflite: 2.4.2
  tray_manager: 0.5.2
  tuple: 2.0.2
  url_launcher: 6.3.2
  uuid: 4.5.2
  window_manager: 0.5.1

dev_dependencies:
  flutter_launcher_icons: 0.14.4
  flutter_lints: 4.0.0
  flutter_native_splash: 2.4.7
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/svg/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-Light.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
        - asset: assets/fonts/Inter-Bold.ttf
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher-icons/icon-ios-default.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1071FF"
  adaptive_icon_foreground: "assets/launcher-icons/icon-foreground.png"
  adaptive_icon_monochrome: "assets/launcher-icons/icon-monochrome-foreground.png"
  adaptive_icon_foreground_inset: 4
  image_path_ios_dark_transparent: "assets/launcher-icons/icon-ios-foreground.png"
  image_path_ios_tinted_grayscale: "assets/launcher-icons/icon-ios-tinted.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#000000"
  image: "assets/launcher-icons/icon-foreground.png"
  android_gravity: center
  ios_content_mode: center
  android: true
  ios: true
  web: false
  android_12:
    image: "assets/launcher-icons/icon-foreground.png"
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"
    color_dark: "#000000"
    icon_background_color_dark: "#000000"
