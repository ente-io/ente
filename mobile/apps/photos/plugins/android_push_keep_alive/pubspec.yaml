name: android_push_keep_alive
description: "Android foreground-service keep-alive bridge for push-triggered sync."
version: 1.0.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.ente.photos.android_push_keep_alive
        pluginClass: AndroidPushKeepAlivePlugin
