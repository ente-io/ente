publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.3.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: GraceWindowIosPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
