name: backup_exclusion
description: iOS backup exclusion utilities for Ente Flutter apps

resolution: workspace
environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  logging: 1.3.0

dev_dependencies:
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: BackupExclusionPlugin
