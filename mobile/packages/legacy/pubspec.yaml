name: ente_legacy
description: A Flutter package containing legacy services for Ente apps
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  collection: 1.19.1
  dio: 5.9.0
  email_validator: 3.0.0
  ente_accounts:
    path: ../accounts
  ente_base:
    path: ../base
  ente_configuration:
    path: ../configuration
  ente_contacts:
    path: ../contacts
  ente_crypto_api:
    path: ../ente_crypto_api
  ente_network:
    path: ../network
  ente_pure_utils:
    path: ../ente_pure_utils
  ente_rust:
    path: ../rust
  ente_sharing:
    path: ../sharing
  ente_strings:
    path: ../strings
  ente_ui:
    path: ../ui
  ente_utils:
    path: ../utils
  file_saver: 0.3.1
  flutter:
    sdk: flutter
  flutter_svg: 2.2.3
  hugeicons: 1.1.5
  intl: 0.20.2
  logging: 1.3.0
  password_strength: 0.2.0
  pdf: 3.11.3
  pointycastle: 3.9.1
  share_plus: 11.1.0
  uuid: 4.5.2

dev_dependencies:
  flutter_lints: 5.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/

# This package is not meant to be published
publish_to: none
