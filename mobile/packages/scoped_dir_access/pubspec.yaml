name: scoped_dir_access
description: Cross-platform directory access with security-scoped persistent access (iOS/macOS security-scoped bookmarks, Android SAF)
version: 1.0.0
homepage: https://github.com/ente-io/ente

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=2.5.0"

dependencies:
  file_picker: 10.3.10
  flutter:
    sdk: flutter
  logging: 1.3.0
  path: 1.9.1
  saf_stream: 2.0.0
  saf_util: 2.0.0

dev_dependencies:
  flutter_lints: 2.0.3
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: DirUtilsPlugin
      macos:
        pluginClass: DirUtilsPlugin
