[package]
name = "ente-wasm"
version = "0.0.1"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
ente-contacts = { path = "../../../rust/contacts" }
ente-core = { path = "../../../rust/core", features = ["srp"] }
md-5 = "0.11"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

[lints.rust]
missing_docs = "warn"
